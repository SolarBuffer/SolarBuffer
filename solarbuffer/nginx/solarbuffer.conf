# Nginx reverse proxy voor SolarBuffer
# Installeren: sudo cp solarbuffer.conf /etc/nginx/sites-available/solarbuffer
#              sudo ln -s /etc/nginx/sites-available/solarbuffer /etc/nginx/sites-enabled/
#              sudo nginx -t && sudo systemctl reload nginx

# Hoofdapp: app.solarbuffer.local -> Flask op poort 5001
server {
    listen 80;
    server_name app.solarbuffer.local;

    location / {
        proxy_pass http://127.0.0.1:5001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # WebSocket support (voor live updates)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# WiFi setup: wifi.solarbuffer.local -> wifi.py op poort 8080
server {
    listen 80;
    server_name wifi.solarbuffer.local;

    location / {
        proxy_pass http://127.0.0.1:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

# Fallback: solarbuffer.local (zonder subdomain) stuurt door naar de app
server {
    listen 80;
    server_name solarbuffer.local;

    location / {
        return 301 http://app.solarbuffer.local$request_uri;
    }
}
