<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarBuffer Configuratie Wizard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: hsl(30, 25%, 97%);
            color: hsl(220, 20%, 14%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            border: 1px solid hsl(30, 15%, 88%);
            border-radius: 0.75rem;
            box-shadow: 0 10px 40px -10px hsla(32, 95%, 52%, 0.15);
            padding: 2rem;
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header .icon { font-size: 2rem; color: hsl(32, 95%, 52%); }
        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; font-size: 1.75rem; margin-top: 0.25rem;
        }
        .header h1 .solar {
            background: linear-gradient(135deg, hsl(32, 95%, 52%), hsl(40, 100%, 60%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: hsl(220, 10%, 46%); font-size: 0.85rem; margin-top: 0.25rem; }

        form { display: flex; flex-direction: column; gap: 1.25rem; }
        label { font-weight: 600; font-size: 0.95rem; color: hsl(220, 20%, 14%); }
        input[type="text"], input[type="number"] {
            padding: 0.6rem 0.75rem;
            border: 1px solid hsl(30, 15%, 88%);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="number"]:focus {
            border-color: hsl(32, 95%, 52%);
            outline: none;
        }
        button {
            background: hsl(32, 95%, 52%);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: hsl(32, 85%, 45%); }

        .status { margin-top: 1rem; font-size: 0.9rem; color: hsl(0, 75%, 60%);
                  min-height: 1.2rem; text-align: center; }

        /* Shelly device rows */
        .device-row {
            display: flex;
            flex-direction: column;
            gap: 0.5rem; /* Ruimte tussen top en bottom rij */
            margin-bottom: 1rem; /* Ruimte tussen apparaten */
        }
        .device-row-top input {
            width: 100%;
            padding: 0.6rem 0.75rem;
        }
        .device-row-bottom {
            display: flex;
            gap: 0.5rem;
            align-items: center;
        }
        .device-row-bottom input[name="shelly_ip[]"] {
            flex: 2; /* 2/3 van de breedte */
            padding: 0.6rem 0.75rem;
        }
        .device-row-bottom input[name="priority[]"] {
            flex: 1; /* 1/3 van de breedte */
            padding: 0.6rem 0.75rem;
        }
        .remove-btn {
            background: hsl(0, 70%, 55%);
            border: none;
            color: white;
            font-size: 1.1rem;
            border-radius: 0.4rem;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            font-weight: bold;
            margin-left: 0.25rem; /* kleine ruimte tussen input en knop */
        }
        .remove-btn:hover { background: hsl(0, 70%, 45%); }
        #addDeviceBtn {
            background: hsl(145, 65%, 40%);
        }
        #addDeviceBtn:hover {
            background: hsl(145, 65%, 32%);
        }
    </style>
</head>
<body>
    <div class="container" role="main">
        <div class="header" role="banner">
            <div class="icon" aria-hidden="true">☀️</div>
            <h1><span class="solar">Solar</span>Buffer Wizard</h1>
            <p>Voer de IP‑adressen in van je apparaten en stel de prioriteit in.</p>
        </div>

        <form id="configForm" method="POST" action="/wizard_forced">
            <!-- P1 meter -->
            <label for="p1ip">IP‑adres P1‑meter</label>
            <input type="text" id="p1ip" name="p1ip"
                   placeholder="Bijv. 192.168.178.21"
                   required pattern="^(\d{1,3}\.){3}\d{1,3}$" />

            <!-- Shelly devices -->
            <label>Shelly‑apparaten</label>
            <div id="deviceContainer"></div>

            <button type="button" id="addDeviceBtn" onclick="addDevice()">+ Apparaat toevoegen</button>

            <button type="submit">Opslaan en verder</button>
            <div class="status" id="statusMessage" role="alert" aria-live="polite"></div>
        </form>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const savedP1 = "{{ config.p1_ip or '' }}";
            const devices = {{ config.shelly_devices|tojson or [] }};
            if (savedP1) document.getElementById('p1ip').value = savedP1;

            const container = document.getElementById('deviceContainer');

            if (devices.length > 0) {
                devices.forEach(d => addDevice(d.name, d.ip, d.priority));
            } else {
                addDevice();
            }
        });

        function addDevice(name = '', ip = '', priority = 1) {
            const container = document.getElementById('deviceContainer');
            
            // Limiet van 5 apparaten
            if (container.children.length >= 5) {
                alert("Je kunt maximaal 5 apparaten toevoegen.");
                return;
            }

            const row = document.createElement('div');
            row.className = 'device-row';
            row.innerHTML = `
                <div class="device-row-top">
                    <input type="text" name="shelly_name[]" placeholder="Naam (bijv. Woonkamer)" value="${name}" required>
                </div>
                <div class="device-row-bottom">
                    <input type="text" name="shelly_ip[]" placeholder="IP (bijv. 192.168.178.195)" value="${ip}" required pattern="^(\\d{1,3}\\.){3}\\d{1,3}$">
                    <input type="number" name="priority[]" placeholder="Prioriteit (1 = hoogst)" min="1" max="5" value="${priority}" required>
                    <button type="button" class="remove-btn" onclick="removeDevice(this)">✕</button>
                </div>
            `;
            container.appendChild(row);
        }

        function removeDevice(btn) {
            const container = document.getElementById('deviceContainer');
            if (container.children.length > 1) {
                btn.parentElement.parentElement.remove();
            }
        }
    </script>
</body>
</html>
