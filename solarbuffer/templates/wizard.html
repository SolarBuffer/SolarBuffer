<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarBuffer Configuratie Wizard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: hsl(30, 25%, 97%);
            color: hsl(220, 20%, 14%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            border: 1px solid hsl(30, 15%, 88%);
            border-radius: 0.75rem;
            box-shadow: 0 10px 40px -10px hsla(32, 95%, 52%, 0.15);
            padding: 2rem;
        }
        .header {
            text-align: center;
            margin-bottom: 2rem;
        }
        .header .icon { font-size: 2rem; color: hsl(32, 95%, 52%); }
        .header h1 { font-family: 'Space Grotesk', sans-serif; font-weight: 700; font-size: 1.75rem; margin-top: 0.25rem; }
        .header h1 .solar { background: linear-gradient(135deg, hsl(32, 95%, 52%), hsl(40, 100%, 60%)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .header p { color: hsl(220, 10%, 46%); font-size: 0.85rem; margin-top: 0.25rem; }

        form { display: flex; flex-direction: column; gap: 1.25rem; }
        label { font-weight: 600; font-size: 0.95rem; color: hsl(220, 20%, 14%); }
        input[type="text"] {
            padding: 0.6rem 0.75rem;
            border: 1px solid hsl(30, 15%, 88%);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus { border-color: hsl(32, 95%, 52%); outline: none; }
        button {
            background: hsl(32, 95%, 52%);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: hsl(32, 85%, 45%); }
        .status { margin-top: 1rem; font-size: 0.9rem; color: hsl(0, 75%, 60%); min-height: 1.2rem; text-align: center; }
    </style>
</head>
<body>
    <div class="container" role="main">
        <div class="header" role="banner">
            <div class="icon" aria-hidden="true">☀️</div>
            <h1><span class="solar">Solar</span>Buffer Wizard</h1>
            <p>Voer de IP-adressen in van je apparaten</p>
        </div>

        <form id="configForm" method="POST" action="/">
            <label for="p1ip">IP-adres P1 meter</label>
            <input type="text" id="p1ip" name="p1ip" placeholder="Bijv. 192.168.178.21" required pattern="^(\d{1,3}\.){3}\d{1,3}$" />

            <label for="shellyip">IP-adres Shelly device</label>
            <input type="text" id="shellyip" name="shellyip" placeholder="Bijv. 192.168.178.195" required pattern="^(\d{1,3}\.){3}\d{1,3}$" />

            <button type="submit">Opslaan en Verder</button>
            <div class="status" id="statusMessage" role="alert" aria-live="polite"></div>
        </form>
    </div>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            const savedP1 = "{{ config['p1_ip'] }}";
            const savedShelly = "{{ config['shelly_ip'] }}";
            if (savedP1) document.getElementById('p1ip').value = savedP1;
            if (savedShelly) document.getElementById('shellyip').value = savedShelly;
        });
    </script>
</body>
</html>
