<!DOCTYPE html>
<html lang="nl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SolarBuffer Configuratie Wizard</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: hsl(30, 25%, 97%);
            color: hsl(220, 20%, 14%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .container {
            width: 100%;
            max-width: 480px;
            background: white;
            border: 1px solid hsl(30, 15%, 88%);
            border-radius: 0.75rem;
            box-shadow: 0 10px 40px -10px hsla(32, 95%, 52%, 0.15);
            padding: 2rem;
        }
        .header { text-align: center; margin-bottom: 2rem; }
        .header .icon { font-size: 2rem; color: hsl(32, 95%, 52%); }
        .header h1 {
            font-family: 'Space Grotesk', sans-serif;
            font-weight: 700; font-size: 1.75rem; margin-top: 0.25rem;
        }
        .header h1 .solar {
            background: linear-gradient(135deg, hsl(32, 95%, 52%), hsl(40, 100%, 60%));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .header p { color: hsl(220, 10%, 46%); font-size: 0.85rem; margin-top: 0.25rem; }

        form { display: flex; flex-direction: column; gap: 1.25rem; }
        label { font-weight: 600; font-size: 0.95rem; color: hsl(220, 20%, 14%); }
        input[type="text"], input[type="number"], select {
            padding: 0.6rem 0.75rem;
            border: 1px solid hsl(30, 15%, 88%);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus, input[type="number"]:focus, select:focus {
            border-color: hsl(32, 95%, 52%);
            outline: none;
        }
        button {
            background: hsl(32, 95%, 52%);
            color: white;
            font-weight: 600;
            font-size: 1rem;
            padding: 0.75rem;
            border: none;
            border-radius: 0.5rem;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover { background: hsl(32, 85%, 45%); }

        .status { margin-top: 1rem; font-size: 0.9rem; color: hsl(0, 75%, 60%);
                  min-height: 1.2rem; text-align: center; }

        /* Shelly device rows */
        .device-row {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .device-row-top, .device-row-bottom { display: flex; flex-direction: column; gap: 0.25rem; }
        .device-row-top input, .device-row-bottom input, .device-row-bottom select { width: 100%; }
        .device-row-bottom {
            flex-direction: row;
            gap: 0.5rem;
            align-items: flex-end;
        }
        .device-row-bottom input[name="shelly_ip[]"], 
        .device-row-bottom select[name="priority[]"] {
            padding: 0.6rem 0.75rem;
            border: 1px solid hsl(30, 15%, 88%);
            border-radius: 0.5rem;
            font-size: 1rem;
            font-family: 'Inter', sans-serif;
            line-height: 1.5;
            appearance: none;
        }
        .device-row-bottom input[name="shelly_ip[]"] { flex: 2; } 
        .device-row-bottom select[name="priority[]"] { flex: 1; } 

        .remove-btn {
            background: hsl(0, 70%, 55%);
            border: none;
            color: white;
            font-size: 1.1rem;
            border-radius: 0.4rem;
            padding: 0.3rem 0.6rem;
            cursor: pointer;
            font-weight: bold;
        }
        .remove-btn:hover { background: hsl(0, 70%, 45%); }
        #addDeviceBtn {
            background: hsl(145, 65%, 40%);
        }
        #addDeviceBtn:hover {
            background: hsl(145, 65%, 32%);
        }
    </style>
</head>
<body>
    <div class="container" role="main">
        <div class="header" role="banner">
            <div class="icon" aria-hidden="true">☀️</div>
            <h1><span class="solar">Solar</span>Buffer Wizard</h1>
            <p>Voer de IP‑adressen in van je apparaten en stel de prioriteit in.</p>
        </div>

        <form id="configForm" method="POST" action="/wizard_forced">
            <!-- P1 meter -->
            <label for="p1ip">IP‑adres P1‑meter</label>
            <input type="text" id="p1ip" name="p1ip"
                   placeholder="Bijv. 192.168.178.21"
                   required pattern="^(\d{1,3}\.){3}\d{1,3}$" />

            <!-- Shelly devices -->
            <label>Shelly‑apparaten</label>
            <div id="deviceContainer"></div>

            <button type="button" id="addDeviceBtn" onclick="addDevice()">+ Apparaat toevoegen</button>

            <button type="submit">Opslaan en verder</button>
            <div class="status" id="statusMessage" role="alert" aria-live="polite"></div>
        </form>
    </div>

    <script>
        function createPriorityOptions(selected = "") {
            let options = '<option value="">Kies</option>';
            for (let i = 1; i <= 5; i++) {
                options += `<option value="${i}" ${selected == i ? 'selected' : ''}>${i}</option>`;
            }
            return options;
        }

        function updatePriorities() {
            const selects = document.querySelectorAll('select[name="priority[]"]');
            selects.forEach((select, index) => {
                if (!select.value) select.value = index + 1;
            });
        }

        function addDevice(name = '', ip = '', priority = '') {
            const container = document.getElementById('deviceContainer');
            if (container.children.length >= 5) {
                alert("Je kunt maximaal 5 apparaten toevoegen.");
                return;
            }

            const row = document.createElement('div');
            row.className = 'device-row';

            row.innerHTML = `
                <div class="device-row-top">
                    <label>Naam</label>
                    <input type="text" name="shelly_name[]" placeholder="Bijv. Woonkamer" value="${name}" required>
                </div>
                <div class="device-row-bottom">
                    <div style="flex:2; display:flex; flex-direction:column;">
                        <label>IP-adres</label>
                        <input type="text" name="shelly_ip[]" placeholder="Bijv. 192.168.178.195" value="${ip}" required pattern="^(\\d{1,3}\\.){3}\\d{1,3}$">
                    </div>
                    <div style="flex:1; display:flex; flex-direction:column;">
                        <label>Prioriteit</label>
                        <select name="priority[]" required>${createPriorityOptions(priority)}</select>
                    </div>
                    <button type="button" class="remove-btn" onclick="removeDevice(this)">✕</button>
                </div>
            `;
            container.appendChild(row);
            updatePriorities();
        }

        function removeDevice(btn) {
            const container = document.getElementById('deviceContainer');
            if (container.children.length > 1) {
                btn.closest('.device-row').remove();
                updatePriorities();
            }
        }

        document.getElementById('configForm').addEventListener('submit', function(e) {
            const selects = document.querySelectorAll('select[name="priority[]"]');
            const values = Array.from(selects).map(s => s.value);
            const status = document.getElementById('statusMessage');

            if (values.includes("")) {
                e.preventDefault();
                status.textContent = "Vul alle prioriteiten in.";
                return;
            }

            const unique = new Set(values);
            if (unique.size !== values.length) {
                e.preventDefault();
                status.textContent = "Elke prioriteit mag maar één keer voorkomen.";
                return;
            }

            status.textContent = "";
        });

        // Correct laden van bestaande config
        window.addEventListener('DOMContentLoaded', () => {
            const savedP1 = "{{ config.p1_ip or '' }}";
            const devices = {{ config.shelly_devices|tojson or [] }};
            if (savedP1) document.getElementById('p1ip').value = savedP1;

            if (devices.length > 0) {
                devices.forEach(d => addDevice(d.name, d.ip, d.priority));
            } else {
                addDevice();
            }
        });
    </script>
</body>
</html>
