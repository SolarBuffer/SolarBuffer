<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#f9f7f5" id="themeColorMeta">
  <title>P1 &amp; Batterij - SolarBuffer</title>
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <script>
    (function () {
      var dark = {{ dark_mode | tojson }};
      localStorage.setItem("theme", dark ? "dark" : "light");
      if (dark) {
        document.documentElement.setAttribute("data-theme", "dark");
        document.getElementById("themeColorMeta").setAttribute("content", "#2e3238");
      }
    })();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');
    @keyframes spin { to { transform: rotate(360deg); } }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: hsl(30, 25%, 97%);
      color: hsl(220, 20%, 14%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 3rem;
    }
    h1, h2 { font-family: 'Space Grotesk', sans-serif; }
    .container { width: 100%; max-width: 480px; }

    .header { text-align: center; margin-bottom: 1.75rem; }
    .header h1 { font-size: 1.75rem; font-weight: 700; }
    .header h1 .solar {
      background: linear-gradient(135deg, hsl(32, 95%, 52%), hsl(40, 100%, 60%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { color: hsl(220, 10%, 46%); font-size: 0.85rem; margin-top: 0.25rem; }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: white;
      border: 1.5px solid hsl(30, 15%, 85%);
      border-radius: 999px;
      padding: 0.45rem 0.9rem 0.45rem 0.65rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: hsl(220, 20%, 30%);
      text-decoration: none;
      box-shadow: 0 2px 8px -2px rgba(0,0,0,0.10);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      margin-bottom: 0.75rem;
    }
    .back-btn:hover { background: hsl(32, 100%, 96%); border-color: hsl(32, 85%, 60%); color: hsl(32, 90%, 40%); }

    .card {
      background: white;
      border: 1px solid hsl(30, 15%, 88%);
      border-radius: 0.75rem;
      box-shadow: 0 10px 40px -10px hsla(32, 95%, 52%, 0.15);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: hsl(220, 10%, 52%);
      margin-bottom: 0.85rem;
    }

    .field-group { margin-bottom: 0.85rem; }
    .field-group:last-child { margin-bottom: 0; }
    .field-group label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: hsl(220, 10%, 46%);
      margin-bottom: 0.35rem;
    }
    .field-group input {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid hsl(30, 15%, 82%);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      background: white;
      color: hsl(220, 20%, 14%);
      transition: border-color 0.2s;
    }
    .field-group input:focus { outline: none; border-color: hsl(32, 85%, 55%); }

    .btn-scan {
      display: block;
      width: 100%;
      background: hsl(215, 70%, 52%);
      color: white;
      font-weight: 600;
      font-size: 0.95rem;
      padding: 0.7rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      margin-top: 0.75rem;
    }
    .btn-scan:hover { background: hsl(215, 70%, 45%); transform: translateY(-1px); }
    .btn-scan:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

    .scan-status {
      margin-top: 0.6rem;
      font-size: 0.83rem;
      color: hsl(220, 10%, 46%);
      min-height: 1.2rem;
    }
    .scan-results {
      margin-top: 0.6rem;
      padding: 0.65rem 0.85rem;
      background: hsl(145, 55%, 94%);
      border: 1px solid hsl(145, 45%, 78%);
      border-radius: 0.5rem;
      font-size: 0.83rem;
      color: hsl(145, 50%, 28%);
      display: none;
    }
    .scan-results.visible { display: block; }
    .scan-results ul { margin: 0.3rem 0 0 1rem; }
    .scan-results li { margin-bottom: 0.2rem; }

    .btn-primary {
      display: block;
      width: 100%;
      background: hsl(32, 95%, 52%);
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.7rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }
    .btn-primary:hover { background: hsl(32, 90%, 45%); transform: translateY(-1px); }

    .btn-secondary {
      flex: 1;
      background: hsl(30, 15%, 95%);
      color: hsl(220, 20%, 30%);
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.7rem;
      border: 1px solid hsl(30, 15%, 84%);
      border-radius: 0.5rem;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
      text-decoration: none;
      display: block;
    }
    .btn-secondary:hover { background: hsl(30, 15%, 88%); }
    .btn-row { display: flex; gap: 0.75rem; }
    .btn-row .btn-primary { flex: 1; }

    /* DARK MODE */
    html[data-theme="dark"] body { background: hsl(220, 8%, 20%); color: hsl(220, 10%, 88%); }
    html[data-theme="dark"] .header p { color: hsl(220, 8%, 58%); }
    html[data-theme="dark"] .card { background: hsl(220, 8%, 26%); border-color: hsl(220, 8%, 34%); box-shadow: 0 10px 40px -10px rgba(0,0,0,0.2); }
    html[data-theme="dark"] .card-title { color: hsl(220, 8%, 50%); }
    html[data-theme="dark"] .field-group label { color: hsl(220, 8%, 56%); }
    html[data-theme="dark"] .field-group input { background: hsl(220, 8%, 22%); border-color: hsl(220, 8%, 36%); color: hsl(220, 10%, 88%); }
    html[data-theme="dark"] .field-group input:focus { border-color: hsl(32, 75%, 52%); }
    html[data-theme="dark"] .scan-status { color: hsl(220, 8%, 56%); }
    html[data-theme="dark"] .scan-results { background: hsl(145, 20%, 22%); border-color: hsl(145, 30%, 32%); color: hsl(145, 50%, 62%); }
    html[data-theme="dark"] .back-btn { background: hsl(220, 8%, 26%); border-color: hsl(220, 8%, 36%); color: hsl(220, 10%, 82%); }

    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.65rem;
      font-weight: 600;
      font-size: 0.95rem;
      cursor: pointer;
    }
    .toggle-row input[type="checkbox"] {
      width: 1rem;
      height: 1rem;
      accent-color: hsl(32, 95%, 52%);
      cursor: pointer;
    }
    .toggle {
      position: relative;
      width: 44px;
      height: 24px;
      flex-shrink: 0;
      cursor: pointer;
    }
    .toggle input { display: none; }
    .toggle .slider {
      position: absolute;
      inset: 0;
      background: hsl(30, 15%, 80%);
      border-radius: 12px;
      transition: background 0.25s;
    }
    .toggle input:checked + .slider { background: hsl(32, 95%, 52%); }
    .toggle .slider::before {
      content: "";
      position: absolute;
      width: 20px; height: 20px;
      left: 2px; top: 2px;
      background: white;
      border-radius: 50%;
      box-shadow: 0 1px 4px rgba(0,0,0,0.2);
      transition: transform 0.25s;
    }
    .toggle input:checked + .slider::before { transform: translateX(20px); }
    html[data-theme="dark"] .toggle .slider { background: hsl(220, 8%, 42%); }
    html[data-theme="dark"] .toggle input:checked + .slider { background: hsl(32, 95%, 52%); }
    .solaredge-fields { margin-top: 1rem; }
    html[data-theme="dark"] .toggle-row { color: hsl(220, 10%, 88%); }

    .prio-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
      margin-top: 0.5rem;
    }
    .prio-option { display: none; }
    .prio-grid .prio-card {
      display: block !important;
      padding: 1rem 0.75rem;
      border: 2px solid hsl(220, 12%, 82%);
      border-radius: 0.9rem;
      background: hsl(220, 20%, 98%);
      cursor: pointer;
      text-align: center !important;
      user-select: none;
      transition: border-color 0.15s, background 0.15s;
      margin-bottom: 0 !important;
    }
    .prio-grid .prio-card:hover { border-color: hsl(32, 80%, 60%); background: hsl(32, 100%, 97%); }
    .prio-option:checked + .prio-card {
      border-color: hsl(32, 92%, 50%);
      background: hsl(32, 100%, 96%);
    }
    .prio-icon {
      width: 48px; height: 48px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      background: hsl(220, 14%, 88%);
      color: hsl(220, 15%, 40%);
      margin: 0 auto 0.5rem;
    }
    .prio-icon svg { display: block; }
    .prio-option:checked + .prio-card .prio-icon {
      background: hsl(32, 92%, 50%);
      color: #fff;
    }
    .prio-label {
      display: block;
      font-size: 0.84rem;
      font-weight: 700;
      color: hsl(220, 15%, 18%);
      margin-bottom: 0.15rem;
    }
    .prio-sub {
      display: block;
      font-size: 0.70rem;
      color: hsl(220, 10%, 52%);
      line-height: 1.35;
    }
    html[data-theme="dark"] .prio-grid .prio-card { background: hsl(220, 8%, 20%); border-color: hsl(220, 8%, 34%); }
    html[data-theme="dark"] .prio-grid .prio-card:hover { border-color: hsl(32, 70%, 48%); background: hsl(220, 8%, 24%); }
    html[data-theme="dark"] .prio-option:checked + .prio-card { border-color: hsl(32, 85%, 54%); background: hsl(220, 8%, 26%); }
    html[data-theme="dark"] .prio-icon { background: hsl(220, 8%, 30%); color: hsl(220, 10%, 70%); }
    html[data-theme="dark"] .prio-option:checked + .prio-card .prio-icon { background: hsl(32, 85%, 50%); color: #fff; }
    html[data-theme="dark"] .prio-label { color: hsl(220, 10%, 88%); }
    html[data-theme="dark"] .prio-sub   { color: hsl(220, 8%, 56%); }
    .select-field {
      width: 100%;
      padding: 0.65rem 0.85rem;
      border: 1.5px solid hsl(30, 15%, 82%);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      background: white;
      color: hsl(220, 20%, 14%);
      appearance: none;
      transition: border-color 0.2s;
    }
    .select-field:focus { outline: none; border-color: hsl(32, 85%, 55%); }
    html[data-theme="dark"] .select-field { background: hsl(220, 8%, 22%); border-color: hsl(220, 8%, 36%); color: hsl(220, 10%, 88%); }
    html[data-theme="dark"] .back-btn:hover { background: hsl(220, 8%, 32%); border-color: hsl(32, 70%, 50%); color: hsl(32, 80%, 62%); }
    html[data-theme="dark"] .btn-secondary { background: hsl(220, 8%, 30%); border-color: hsl(220, 8%, 40%); color: hsl(220, 8%, 80%); }
    html[data-theme="dark"] .btn-secondary:hover { background: hsl(220, 8%, 36%); }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1><span class="solar">Solar</span>Buffer</h1>
      <p>P1 &amp; Batterij</p>
    </div>

    <a class="back-btn" href="/settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
      Instellingen
    </a>

    <form method="POST" action="/settings/p1">
      <div class="card">
        <div class="card-title">P1-meter koppelen</div>
        <div class="field-group">
          <label for="p1ip">IP-adres P1-meter</label>
          <input type="text" id="p1ip" name="p1ip"
                 placeholder="Bijv. 192.168.178.21"
                 value="{{ config.p1_ip or '' }}"
                 pattern="^(\d{1,3}\.){3}\d{1,3}$" required>
        </div>
        <button type="button" class="btn-scan" id="scanBtn" onclick="doScan()">Scan netwerk</button>
        <div class="scan-status" id="scanStatus"></div>
        <div class="scan-results" id="scanResults"></div>
      </div>

      <div class="card">
        <div class="card-title">Batterij (HomeWizard HWE-BAT)</div>
        <div class="toggle-row" style="margin-bottom:0.75rem;">
          <label for="batteryEnabled" style="cursor:pointer;font-weight:600;">Batterij koppelen via lokale API</label>
          <label class="toggle">
            <input type="checkbox" id="batteryEnabled" name="battery_enabled"
                   {% if config.battery_enabled %}checked{% endif %}>
            <span class="slider"></span>
          </label>
        </div>
        <div id="batteryFields" style="display:none;">
          <div class="field-group">
            <label>IP-adres(sen) HWE-BAT <span style="font-weight:400;color:hsl(220,10%,55%);font-size:0.78rem;">(max. 4)</span></label>
            <div id="batteryIpsList">
              {% for ip in (config.battery_ips if config.battery_ips else ['']) %}
              <div class="battery-ip-row" style="display:flex;gap:0.5rem;align-items:center;margin-bottom:0.5rem;">
                <input type="text" name="battery_ip[]"
                       placeholder="Bijv. 192.168.178.50"
                       value="{{ ip }}" style="flex:1;">
                <button type="button" onclick="removeIpRow(this)" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:hsl(0,60%,55%);padding:0.3rem;flex-shrink:0;" title="Verwijderen">✕</button>
              </div>
              {% endfor %}
            </div>
            <button type="button" id="addIpBtn" onclick="addIpRow()" style="margin-top:0.25rem;background:none;border:1.5px dashed hsl(30,15%,78%);border-radius:0.5rem;color:hsl(220,10%,50%);font-size:0.85rem;padding:0.45rem 0.75rem;cursor:pointer;width:100%;">
              + Accu toevoegen
            </button>
          </div>

          <div class="field-group">
            <label for="battery_token">API-token</label>
            <div style="display:flex;gap:0.5rem;align-items:center;">
              <input type="text" id="battery_token" name="battery_token"
                     placeholder="Klik op Koppelen om automatisch op te halen"
                     value="{{ config.battery_token or '' }}"
                     autocomplete="off" style="flex:1;">
              <button type="button" class="btn-secondary" id="pairBtn" onclick="startPairing()" style="white-space:nowrap;padding:0.55rem 0.75rem;flex-shrink:0;">
                Koppelen
              </button>
            </div>
            <div style="font-size:0.75rem;color:hsl(220,10%,55%);margin-top:0.3rem;">Token werkt voor alle accu's — druk de knop in op: <span id="pairIpHint" style="font-weight:600;">—</span></div>
          </div>

          <!-- Koppelstatus -->
          <div id="pairStatus" style="display:none; margin-bottom:0.75rem; padding:0.75rem 1rem; border-radius:0.6rem; font-size:0.88rem; border:1px solid transparent;">
            <div id="pairStatusText"></div>
          </div>
          <div class="field-group">
            <label>Prioriteit</label>
            <div class="prio-grid">
              <input type="radio" class="prio-option" id="prio_battery" name="battery_priority" value="battery"
                     {% if config.battery_priority == 'battery' %}checked{% endif %}>
              <label class="prio-card" for="prio_battery">
                <div class="prio-icon">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M15.67,4H14V2H10V4H8.33A1.33,1.33 0 0,0 7,5.33V20.67C7,21.4 7.6,22 8.33,22H15.67A1.33,1.33 0 0,0 17,20.67V5.33C17,4.6 16.4,4 15.67,4M13,18V13H11L13,8V13H15L13,18Z"/>
                  </svg>
                </div>
                <span class="prio-label">Batterij eerst</span>
                <span class="prio-sub">Laad tot SoC-drempel, dan SolarBuffer</span>
              </label>

              <input type="radio" class="prio-option" id="prio_boiler" name="battery_priority" value="boiler"
                     {% if config.battery_priority != 'battery' %}checked{% endif %}>
              <label class="prio-card" for="prio_boiler">
                <div class="prio-icon">
                  <svg width="26" height="26" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
                    <path d="M12,7A5,5 0 0,1 17,12A5,5 0 0,1 12,17A5,5 0 0,1 7,12A5,5 0 0,1 12,7M12,9A3,3 0 0,0 9,12A3,3 0 0,0 12,15A3,3 0 0,0 15,12A3,3 0 0,0 12,9M12,2L14.39,5.42C13.65,5.15 12.84,5 12,5C11.16,5 10.35,5.15 9.61,5.42L12,2M3.34,7L7.5,6.65C6.9,7.16 6.36,7.78 5.94,8.5C5.5,9.22 5.25,10 5.11,10.79L3.34,7M3.36,17L5.12,13.23C5.26,14 5.5,14.79 5.93,15.5C6.36,16.22 6.9,16.85 7.5,17.37L3.36,17M20.65,7L18.88,10.79C18.74,10 18.5,9.22 18.07,8.5C17.64,7.78 17.1,7.16 16.5,6.65L20.65,7M20.64,17L16.5,17.37C17.1,16.85 17.64,16.22 18.07,15.5C18.5,14.79 18.74,14 18.88,13.23L20.64,17M12,22L9.59,18.56C10.33,18.83 11.14,19 12,19C12.86,19 13.67,18.83 14.41,18.56L12,22Z"/>
                  </svg>
                </div>
                <span class="prio-label">SolarBuffer eerst</span>
                <span class="prio-sub">SolarBuffer heeft voorrang, batterij volgt</span>
              </label>
            </div>
          </div>
          <div class="field-group" id="socThresholdGroup">
            <label for="battery_soc_threshold">SoC-drempel voor batterij-prioriteit (%)</label>
            <input type="number" id="battery_soc_threshold" name="battery_soc_threshold"
                   min="50" max="100" step="1"
                   value="{{ config.battery_soc_threshold or 95 }}">
          </div>
        </div>
      </div>

      <div class="btn-row">
        <a href="/settings" class="btn-secondary">Annuleren</a>
        <button type="submit" class="btn-primary">Opslaan</button>
      </div>
    </form>
  </div>

  <script>
    function escapeHtml(v) {
      return String(v ?? "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    function updatePairIpHint() {
      var inputs = document.querySelectorAll('#batteryIpsList input[name="battery_ip[]"]');
      var ip = '';
      for (var i = 0; i < inputs.length; i++) {
        var v = inputs[i].value.trim();
        if (v) { ip = v; break; }
      }
      document.getElementById('pairIpHint').textContent = ip || '—';
    }

    (function() {
      const cb = document.getElementById('batteryEnabled');
      const fields = document.getElementById('batteryFields');
      function update() { fields.style.display = cb.checked ? 'block' : 'none'; }
      cb.addEventListener('change', update);
      update();
      document.getElementById('batteryIpsList').addEventListener('input', updatePairIpHint);
      updatePairIpHint();
    })();

    var _pairInterval = null;
    var _pairCountdown = 0;

    function setPairStatus(msg, type) {
      var el = document.getElementById('pairStatus');
      var txt = document.getElementById('pairStatusText');
      txt.innerHTML = msg;
      el.style.display = msg ? 'block' : 'none';
      el.style.background = type === 'success' ? 'hsl(145,55%,94%)' : type === 'error' ? 'hsl(0,70%,95%)' : 'hsl(37,90%,95%)';
      el.style.borderColor = type === 'success' ? 'hsl(145,50%,76%)' : type === 'error' ? 'hsl(0,60%,82%)' : 'hsl(37,80%,78%)';
      el.style.color = type === 'success' ? 'hsl(145,60%,26%)' : type === 'error' ? 'hsl(0,65%,42%)' : 'hsl(30,80%,28%)';
    }

    function stopPairing() {
      if (_pairInterval) { clearInterval(_pairInterval); _pairInterval = null; }
      document.getElementById('pairBtn').textContent = 'Koppelen';
      document.getElementById('pairBtn').disabled = false;
    }

    function startPairing() {
      var inputs = document.querySelectorAll('#batteryIpsList input[name="battery_ip[]"]');
      var ip = '';
      for (var i = 0; i < inputs.length; i++) {
        var v = inputs[i].value.trim();
        if (v) { ip = v; break; }
      }
      if (!ip) { setPairStatus('Vul eerst een IP-adres in.', 'error'); return; }
      stopPairing();
      document.getElementById('pairBtn').disabled = true;
      document.getElementById('pairBtn').textContent = 'Bezig…';
      setPairStatus('<span style="display:inline-flex;align-items:center;gap:0.5rem;"><svg style="animation:spin 1s linear infinite" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12,4V2A10,10 0 0,0 2,12H4A8,8 0 0,1 12,4Z"/></svg> Verbinding maken met apparaat…</span>', 'wait');
      _pairCountdown = 0;
      sendPairRequest(ip);
      _pairInterval = setInterval(function() {
        _pairCountdown++;
        if (_pairCountdown >= 30) {
          stopPairing();
          setPairStatus('Timeout — knop niet op tijd ingedrukt. Probeer opnieuw.', 'error');
          return;
        }
        sendPairRequest(ip);
      }, 2000);
    }

    function sendPairRequest(ip) {
      fetch('/api/battery/pair', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ ip: ip })
      })
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.success && data.token) {
            stopPairing();
            document.getElementById('battery_token').value = data.token;
            setPairStatus('✓ Apparaat gekoppeld! Token is automatisch ingevuld. Sla de instellingen op om te bevestigen.', 'success');
          } else if (data.waiting) {
            var secs = 30 - _pairCountdown * 2;
            setPairStatus('<span style="display:inline-flex;align-items:center;gap:0.5rem;"><svg style="animation:spin 1s linear infinite" width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12,4V2A10,10 0 0,0 2,12H4A8,8 0 0,1 12,4Z"/></svg> Druk op de knop op het HWE-BAT apparaat… (' + Math.max(0, secs) + 's resterend)</span>', 'wait');
          } else if (data.error) {
            stopPairing();
            setPairStatus('Fout: ' + data.error, 'error');
          }
        })
        .catch(function() {
          stopPairing();
          setPairStatus('Verbindingsfout — controleer het IP-adres.', 'error');
        });
    }

    function addIpRow() {
      var list = document.getElementById('batteryIpsList');
      if (list.querySelectorAll('.battery-ip-row').length >= 4) return;
      var row = document.createElement('div');
      row.className = 'battery-ip-row';
      row.style.cssText = 'display:flex;gap:0.5rem;align-items:center;margin-bottom:0.5rem;';
      row.innerHTML = '<input type="text" name="battery_ip[]" placeholder="Bijv. 192.168.178.50" style="flex:1;">'
        + '<button type="button" onclick="removeIpRow(this)" style="background:none;border:none;cursor:pointer;font-size:1.1rem;color:hsl(0,60%,55%);padding:0.3rem;flex-shrink:0;" title="Verwijderen">✕</button>';
      list.appendChild(row);
      row.querySelector('input').addEventListener('input', updatePairIpHint);
      updateAddBtn();
    }

    function removeIpRow(btn) {
      var list = document.getElementById('batteryIpsList');
      if (list.querySelectorAll('.battery-ip-row').length <= 1) return;
      btn.closest('.battery-ip-row').remove();
      updateAddBtn();
      updatePairIpHint();
    }

    function updateAddBtn() {
      var list = document.getElementById('batteryIpsList');
      var btn = document.getElementById('addIpBtn');
      btn.style.display = list.querySelectorAll('.battery-ip-row').length >= 4 ? 'none' : '';
    }

    async function doScan() {
      const btn = document.getElementById('scanBtn');
      const status = document.getElementById('scanStatus');
      const results = document.getElementById('scanResults');
      btn.disabled = true;
      status.textContent = 'Netwerk wordt gescand...';
      results.innerHTML = '';
      results.classList.remove('visible');
      try {
        const r = await fetch('/scan_devices', { headers: { 'Accept': 'application/json' } });
        const data = await r.json();
        const p1List = Array.isArray(data.p1_meters) ? data.p1_meters : [];
        if (p1List.length > 0) {
          const input = document.getElementById('p1ip');
          if (!input.value.trim()) input.value = p1List[0].ip || '';
          let html = '<strong>Gevonden:</strong><ul>';
          p1List.forEach(d => { html += `<li>${escapeHtml(d.name || 'HomeWizard P1')} — ${escapeHtml(d.ip || '')}</li>`; });
          html += '</ul>';
          results.innerHTML = html;
          results.classList.add('visible');
          status.textContent = 'Scan voltooid.';
        } else {
          status.textContent = 'Geen P1-meter gevonden.';
        }
      } catch (e) {
        status.textContent = 'Scannen mislukt.';
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
