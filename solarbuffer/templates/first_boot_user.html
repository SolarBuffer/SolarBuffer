<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#f9f7f5">
  <title>Account aanmaken - SolarBuffer</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: hsl(30, 25%, 97%);
      color: hsl(220, 20%, 14%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem 1rem;
    }
    h1, h2 { font-family: 'Space Grotesk', sans-serif; }
    .container { width: 100%; max-width: 420px; }

    .header { text-align: center; margin-bottom: 2rem; }
    .header h1 { font-size: 2rem; font-weight: 700; margin-bottom: 0.25rem; }
    .header h1 .solar {
      background: linear-gradient(135deg, hsl(32, 95%, 52%), hsl(40, 100%, 60%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header .step {
      display: inline-block;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: hsl(32, 90%, 50%);
      background: hsl(32, 100%, 94%);
      border-radius: 999px;
      padding: 0.2rem 0.7rem;
      margin-bottom: 0.6rem;
    }
    .header .subtitle {
      font-size: 1rem;
      font-weight: 600;
      color: hsl(220, 20%, 24%);
      margin-bottom: 0.35rem;
    }
    .header p { color: hsl(220, 10%, 50%); font-size: 0.85rem; line-height: 1.5; }

    .card {
      background: white;
      border: 1px solid hsl(30, 15%, 88%);
      border-radius: 0.875rem;
      box-shadow: 0 10px 40px -10px hsla(32, 95%, 52%, 0.15);
      padding: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.82rem;
      font-weight: 600;
      color: hsl(220, 10%, 40%);
      margin-bottom: 0.35rem;
    }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.7rem 0.9rem;
      border: 1.5px solid hsl(30, 15%, 82%);
      border-radius: 0.5rem;
      font-size: 1rem;
      font-family: 'Inter', sans-serif;
      background: white;
      color: hsl(220, 20%, 14%);
      margin-bottom: 1rem;
      transition: border-color 0.2s;
    }
    input:focus { outline: none; border-color: hsl(32, 85%, 55%); }

    .password-wrapper {
      position: relative;
      margin-bottom: 1rem;
    }
    .password-wrapper input {
      margin-bottom: 0;
      padding-right: 3rem;
    }
    .toggle-password {
      position: absolute;
      top: 50%;
      right: 0.9rem;
      transform: translateY(-50%);
      cursor: pointer;
      color: hsl(220, 10%, 58%);
      font-size: 1.2rem;
      line-height: 1;
    }
    .toggle-password:hover { color: hsl(220, 20%, 28%); }

    .hint {
      font-size: 0.76rem;
      color: hsl(220, 10%, 56%);
      margin-top: -0.75rem;
      margin-bottom: 1rem;
    }

    .btn-primary {
      display: block;
      width: 100%;
      background: hsl(32, 95%, 52%);
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.8rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      text-align: center;
      transition: background 0.2s, transform 0.15s;
      margin-top: 0.25rem;
    }
    .btn-primary:hover { background: hsl(32, 90%, 45%); transform: translateY(-1px); }
    .btn-primary:active { transform: translateY(0); }

    .error-banner {
      background: hsl(0, 60%, 93%);
      color: hsl(0, 65%, 36%);
      border: 1px solid hsl(0, 55%, 82%);
      border-radius: 0.5rem;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1><span class="solar">Solar</span>Buffer</h1>
      <div class="step">Stap 1 van 2</div>
      <div class="subtitle">Maak een beheerdersaccount aan</div>
      <p>Dit account gebruik je om in te loggen op SolarBuffer. Kies een gebruikersnaam en een sterk wachtwoord.</p>
    </div>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}

    <div class="card">
      <form method="POST">
        <label for="username">Gebruikersnaam</label>
        <input type="text" id="username" name="username" placeholder="bijv. admin"
               autocomplete="username" autocapitalize="none" spellcheck="false">

        <label for="password">Wachtwoord</label>
        <div class="password-wrapper">
          <input type="password" id="password" name="password" placeholder="Minimaal 6 tekens"
                 autocomplete="new-password">
          <i class="mdi mdi-eye-off toggle-password" onclick="togglePassword('password', this)"></i>
        </div>
        <div class="hint">Minimaal 6 tekens</div>

        <label for="confirm_password">Wachtwoord bevestigen</label>
        <div class="password-wrapper">
          <input type="password" id="confirm_password" name="confirm_password" placeholder="Herhaal wachtwoord"
                 autocomplete="new-password">
          <i class="mdi mdi-eye-off toggle-password" onclick="togglePassword('confirm_password', this)"></i>
        </div>

        <button type="submit" class="btn-primary">Account aanmaken →</button>
      </form>
    </div>

  </div>
  <script>
    function togglePassword(id, icon) {
      const input = document.getElementById(id);
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.remove('mdi-eye-off');
        icon.classList.add('mdi-eye');
      } else {
        input.type = 'password';
        icon.classList.remove('mdi-eye');
        icon.classList.add('mdi-eye-off');
      }
    }
  </script>
</body>
</html>
