<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Inloggegevens wijzigen</title>

  <!-- Material Design Icons -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f7f3ef;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }

    .card {
      background: white;
      padding: 2rem;
      border-radius: 12px;
      width: 100%;
      max-width: 420px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
    }

    h1 {
      margin-top: 0;
      margin-bottom: 1rem;
      font-size: 1.4rem;
    }

    p {
      color: #666;
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-weight: 600;
      margin-bottom: 0.35rem;
      margin-top: 1rem;
    }

    input {
      width: 100%;
      padding: 0.8rem;
      border: 1px solid #ddd;
      border-radius: 8px;
      box-sizing: border-box;
      font-size: 1rem;
    }

    .error {
      color: #b00020;
      margin-bottom: 1rem;
      font-size: 0.95rem;
    }

    .actions {
      display: flex;
      gap: 0.75rem;
      margin-top: 1.5rem;
    }

    button, a.button {
      flex: 1;
      text-align: center;
      padding: 0.85rem;
      border: none;
      border-radius: 8px;
      text-decoration: none;
      cursor: pointer;
      font-weight: 600;
      box-sizing: border-box;
    }

    button {
      background: #f59e0b;
      color: white;
    }

    a.button {
      background: #eee;
      color: #333;
    }

    .password-wrapper {
      position: relative;
    }

    .password-wrapper input {
      padding-right: 3rem;
    }

    .toggle-password {
      position: absolute;
      top: 50%;
      right: 0.9rem;
      transform: translateY(-50%);
      cursor: pointer;
      color: #777;
      font-size: 1.2rem;
      line-height: 1;
    }

    .toggle-password:hover {
      color: #333;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Inloggegevens wijzigen</h1>
    <p>Pas hier je gebruikersnaam en wachtwoord aan.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="POST">
      <label for="current_password">Huidig wachtwoord</label>
      <div class="password-wrapper">
        <input type="password" id="current_password" name="current_password" required>
        <i class="mdi mdi-eye-off toggle-password" onclick="togglePassword('current_password', this)"></i>
      </div>

      <label for="new_username">Nieuwe gebruikersnaam</label>
      <input type="text" id="new_username" name="new_username" required>

      <label for="new_password">Nieuw wachtwoord</label>
      <div class="password-wrapper">
        <input type="password" id="new_password" name="new_password" required>
        <i class="mdi mdi-eye-off toggle-password" onclick="togglePassword('new_password', this)"></i>
      </div>

      <label for="confirm_password">Bevestig wachtwoord</label>
      <div class="password-wrapper">
        <input type="password" id="confirm_password" name="confirm_password" required>
        <i class="mdi mdi-eye-off toggle-password" onclick="togglePassword('confirm_password', this)"></i>
      </div>

      <div class="actions">
        <a href="/dashboard" class="button">Terug</a>
        <button type="submit">Opslaan</button>
      </div>
    </form>
  </div>

  <script>
    function togglePassword(fieldId, icon) {
      const field = document.getElementById(fieldId);

      if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("mdi-eye-off");
        icon.classList.add("mdi-eye");
      } else {
        field.type = "password";
        icon.classList.remove("mdi-eye");
        icon.classList.add("mdi-eye-off");
      }
    }
  </script>
</body>
</html>
