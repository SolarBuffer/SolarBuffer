<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="SolarBuffer">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#f9f7f5" id="themeColorMeta">
  <title>Inloggegevens wijzigen - SolarBuffer</title>
  <script>
    (function () {
      var dark = {{ dark_mode | tojson }};
      localStorage.setItem("theme", dark ? "dark" : "light");
      if (dark) {
        document.documentElement.setAttribute("data-theme", "dark");
        document.getElementById("themeColorMeta").setAttribute("content", "#2e3238");
      }
    })();
  </script>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: hsl(30, 25%, 97%);
      color: hsl(220, 20%, 14%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    h1, h2, h3 { font-family: 'Space Grotesk', sans-serif; }
    .container { width: 100%; max-width: 480px; }

    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-size: 1.75rem; font-weight: 700; margin-top: 0.25rem; }
    .header h1 .solar {
      background: linear-gradient(135deg, hsl(32, 95%, 52%), hsl(40, 100%, 60%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { color: hsl(220, 10%, 46%); font-size: 0.85rem; margin-top: 0.25rem; }

    .card {
      background: white;
      border: 1px solid hsl(30, 15%, 88%);
      border-radius: 0.75rem;
      box-shadow: 0 10px 40px -10px hsla(32, 95%, 52%, 0.15);
      padding: 1.25rem;
      margin-bottom: 1rem;
    }
    .card h2 {
      font-size: 1.1rem;
      margin-bottom: 1rem;
    }

    .form-group { display: flex; flex-direction: column; gap: 0.35rem; margin-bottom: 0.75rem; }
    label { font-weight: 600; font-size: 0.9rem; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: 0.6rem 0.75rem;
      border: 1px solid hsl(30, 15%, 88%);
      border-radius: 0.5rem;
      font-size: 0.95rem;
      font-family: 'Inter', sans-serif;
      transition: all 0.2s;
    }
    input:focus {
      border-color: hsl(32, 95%, 52%);
      box-shadow: 0 0 0 3px hsla(32, 95%, 52%, 0.15);
      outline: none;
    }

    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 2.75rem; }
    .toggle-password {
      position: absolute;
      top: 50%;
      right: 0.75rem;
      transform: translateY(-50%);
      cursor: pointer;
      color: hsl(220, 10%, 60%);
      font-size: 1.15rem;
      line-height: 1;
    }
    .toggle-password:hover { color: hsl(220, 20%, 30%); }

    .hint {
      font-size: 0.75rem;
      color: hsl(220, 10%, 55%);
    }

    .btn-save {
      width: 100%;
      background: hsl(32, 95%, 52%);
      color: white;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 1rem;
      padding: 0.7rem;
      border: none;
      border-radius: 0.5rem;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.25rem;
    }
    .btn-save:hover { background: hsl(32, 85%, 45%); transform: translateY(-1px); }
    .btn-save:active { transform: translateY(0); }

    .back-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      background: white;
      border: 1.5px solid hsl(30, 15%, 85%);
      border-radius: 999px;
      padding: 0.45rem 0.9rem 0.45rem 0.65rem;
      font-size: 0.85rem;
      font-weight: 600;
      color: hsl(220, 20%, 30%);
      text-decoration: none;
      box-shadow: 0 2px 8px -2px rgba(0,0,0,0.10);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      margin-bottom: 0.75rem;
    }
    .back-btn:hover {
      background: hsl(32, 100%, 96%);
      border-color: hsl(32, 85%, 60%);
      color: hsl(32, 90%, 40%);
    }

    .error-banner {
      background: hsl(0, 60%, 93%);
      color: hsl(0, 65%, 38%);
      border: 1px solid hsl(0, 55%, 84%);
      border-radius: 0.5rem;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }
    .success-banner {
      background: hsl(145, 60%, 93%);
      color: hsl(145, 65%, 28%);
      border: 1px solid hsl(145, 55%, 78%);
      border-radius: 0.5rem;
      padding: 0.65rem 0.9rem;
      font-size: 0.85rem;
      font-weight: 500;
      margin-bottom: 1rem;
    }

    /* ===== DARK MODE ===== */
    html[data-theme="dark"] body { background: hsl(220, 8%, 20%); color: hsl(220, 10%, 88%); }
    html[data-theme="dark"] .header p { color: hsl(220, 8%, 58%); }
    html[data-theme="dark"] .card {
      background: hsl(220, 8%, 26%);
      border-color: hsl(220, 8%, 34%);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.2);
    }
    html[data-theme="dark"] input[type="text"],
    html[data-theme="dark"] input[type="password"] {
      background: hsl(220, 8%, 32%);
      border-color: hsl(220, 8%, 39%);
      color: hsl(220, 10%, 88%);
    }
    html[data-theme="dark"] label { color: hsl(220, 8%, 82%); }
    html[data-theme="dark"] .hint { color: hsl(220, 8%, 58%); }
    html[data-theme="dark"] .toggle-password { color: hsl(220, 8%, 55%); }
    html[data-theme="dark"] .toggle-password:hover { color: hsl(220, 8%, 82%); }
    html[data-theme="dark"] .back-btn { background: hsl(220, 8%, 26%); border-color: hsl(220, 8%, 36%); color: hsl(220, 10%, 82%); }
    html[data-theme="dark"] .back-btn:hover { background: hsl(220, 8%, 32%); border-color: hsl(32, 70%, 50%); color: hsl(32, 80%, 62%); }
    html[data-theme="dark"] .error-banner {
      background: hsl(0, 20%, 28%);
      color: hsl(0, 60%, 70%);
      border-color: hsl(0, 20%, 36%);
    }
    html[data-theme="dark"] .success-banner {
      background: hsl(145, 25%, 24%);
      color: hsl(145, 55%, 68%);
      border-color: hsl(145, 30%, 34%);
    }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1><span class="solar">Solar</span>Buffer</h1>
      <p>Inloggegevens wijzigen</p>
    </div>

    <a class="back-btn" href="/settings">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
      Instellingen
    </a>

    {% if error %}
    <div class="error-banner">{{ error }}</div>
    {% endif %}
    {% if success %}
    <div class="success-banner">{{ success }}</div>
    {% endif %}

    <!-- Gebruikersnaam wijzigen -->
    <div class="card">
      <h2>Gebruikersnaam wijzigen</h2>
      <form method="POST">
        <input type="hidden" name="action" value="change_username">
        <div class="form-group">
          <label for="current_password_u">Huidig wachtwoord</label>
          <div class="password-wrapper">
            <input type="password" id="current_password_u" name="current_password" required autocomplete="current-password">
            <i class="mdi mdi-eye-off toggle-password" onclick="togglePassword('current_password_u', this)"></i>
          </div>
        </div>
        <div class="form-group">
          <label for="new_username">Nieuwe gebruikersnaam</label>
          <input type="text" id="new_username" name="new_username" required autocomplete="off" autocapitalize="none" spellcheck="false">
        </div>
        <button type="submit" class="btn-save">Gebruikersnaam opslaan</button>
      </form>
    </div>

    <!-- Wachtwoord wijzigen -->
    <div class="card">
      <h2>Wachtwoord wijzigen</h2>
      <form method="POST">
        <input type="hidden" name="action" value="change_password">
        <div class="form-group">
          <label for="current_password_p">Huidig wachtwoord</label>
          <div class="password-wrapper">
            <input type="password" id="current_password_p" name="current_password" required autocomplete="current-password">
            <i class="mdi mdi-eye-off toggle-password" onclick="togglePassword('current_password_p', this)"></i>
          </div>
        </div>
        <div class="form-group">
          <label for="new_password">Nieuw wachtwoord</label>
          <div class="password-wrapper">
            <input type="password" id="new_password" name="new_password" required autocomplete="new-password">
            <i class="mdi mdi-eye-off toggle-password" onclick="togglePassword('new_password', this)"></i>
          </div>
          <span class="hint">Minimaal 6 tekens</span>
        </div>
        <div class="form-group">
          <label for="confirm_password">Bevestig wachtwoord</label>
          <div class="password-wrapper">
            <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password">
            <i class="mdi mdi-eye-off toggle-password" onclick="togglePassword('confirm_password', this)"></i>
          </div>
        </div>
        <button type="submit" class="btn-save">Wachtwoord opslaan</button>
      </form>
    </div>

  </div>

  <script>
    function togglePassword(fieldId, icon) {
      const field = document.getElementById(fieldId);
      if (field.type === "password") {
        field.type = "text";
        icon.classList.remove("mdi-eye-off");
        icon.classList.add("mdi-eye");
      } else {
        field.type = "password";
        icon.classList.remove("mdi-eye");
        icon.classList.add("mdi-eye-off");
      }
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');
  </script>
</body>
</html>
