<!DOCTYPE html>
<html lang="nl" data-theme="{{ 'dark' if dark_mode else 'light' }}">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <meta name="theme-color" content="#f9f7f5" id="themeColorMeta">
  <title>Grafieken - SolarBuffer</title>
  <link rel="apple-touch-icon" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}">
  <link rel="manifest" href="{{ url_for('static', filename='manifest.webmanifest') }}">
  <link rel="icon" type="image/png" href="{{ url_for('static', filename='icons/icon-192.png') }}">
  <script>
    (function () {
      const t = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      document.documentElement.setAttribute('data-theme', t);
      document.getElementById('themeColorMeta').setAttribute('content', t === 'dark' ? '#1a1d23' : '#f9f7f5');
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/hammerjs@2.0.8/hammer.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-zoom@2.0.1/dist/chartjs-plugin-zoom.min.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent:       hsl(32, 95%, 52%);
      --accent-glow:  hsla(32, 95%, 52%, 0.35);
      --accent-light: hsl(32, 100%, 96%);
      --accent-dark:  hsl(32, 90%, 38%);
      --card-bg:      #ffffff;
      --card-border:  hsl(30, 15%, 88%);
      --text:         hsl(220, 20%, 14%);
      --text-muted:   hsl(220, 10%, 48%);
      --bg:           hsl(30, 25%, 97%);
      --shadow-sm:    0 1px 4px -1px rgba(0,0,0,0.08);
      --shadow:       0 4px 16px -4px rgba(0,0,0,0.10), 0 1px 4px -1px rgba(0,0,0,0.05);
      --radius:       1rem;
    }
    html[data-theme="dark"] {
      --accent-light: hsl(220, 8%, 28%);
      --accent-dark:  hsl(32, 85%, 62%);
      --card-bg:      hsl(220, 9%, 19%);
      --card-border:  hsl(220, 8%, 27%);
      --text:         hsl(220, 10%, 90%);
      --text-muted:   hsl(220, 8%, 52%);
      --bg:           hsl(220, 10%, 13%);
      --shadow-sm:    0 1px 4px -1px rgba(0,0,0,0.25);
      --shadow:       0 4px 20px -4px rgba(0,0,0,0.35), 0 1px 4px -1px rgba(0,0,0,0.20);
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 2rem 1rem 4rem;
    }
    html[data-theme="light"] body {
      background:
        radial-gradient(circle at top, hsla(38, 100%, 70%, 0.12), transparent 28%),
        hsl(30, 25%, 97%);
    }

    .container { width: 100%; max-width: 580px; }

    /* ── Header ── */
    .header { text-align: center; margin-bottom: 1.5rem; }
    .header h1 { font-family: 'Space Grotesk', sans-serif; font-size: 1.75rem; font-weight: 700; }
    .header h1 .solar {
      background: linear-gradient(135deg, hsl(32, 95%, 52%), hsl(40, 100%, 62%));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text;
    }
    .header p { color: var(--text-muted); font-size: 0.85rem; margin-top: 0.2rem; }

    /* ── Back button ── */
    .back-btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      background: var(--card-bg); border: 1.5px solid var(--card-border);
      border-radius: 999px; padding: 0.45rem 0.9rem 0.45rem 0.65rem;
      font-size: 0.85rem; font-weight: 600; color: var(--text);
      text-decoration: none; box-shadow: var(--shadow-sm);
      transition: background 0.15s, border-color 0.15s, color 0.15s;
      margin-bottom: 1.25rem;
    }
    .back-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent-dark); }

    /* ── Range controls ── */
    /* Rij 1: snelle bereik-knoppen */
    .range-bar { display: flex; gap: 0.35rem; margin-bottom: 0.4rem; }
    .range-btn {
      flex: 1;
      padding: 0.52rem 0.25rem;
      border: 1.5px solid var(--card-border);
      border-radius: 0.625rem;
      background: var(--card-bg);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      transition: all 0.15s;
      box-shadow: var(--shadow-sm);
    }
    .range-btn:hover { border-color: var(--accent); color: var(--accent-dark); }
    .range-btn.active {
      background: var(--accent); border-color: var(--accent); color: white;
      box-shadow: 0 2px 10px -2px var(--accent-glow);
    }

    /* Rij 2: datum-knop (vol breedte) */
    .datum-btn {
      width: 100%;
      display: flex; align-items: center; justify-content: center; gap: 0.45rem;
      padding: 0.52rem 1rem;
      border: 1.5px solid var(--card-border);
      border-radius: 0.625rem;
      background: var(--card-bg);
      font-family: 'Inter', sans-serif;
      font-size: 0.82rem; font-weight: 600;
      color: var(--text-muted);
      cursor: pointer;
      box-shadow: var(--shadow-sm);
      transition: all 0.15s;
      margin-bottom: 0.75rem;
    }
    .datum-btn:hover { border-color: var(--accent); color: var(--accent-dark); }
    .datum-btn.active {
      background: var(--accent); border-color: var(--accent); color: white;
      box-shadow: 0 2px 10px -2px var(--accent-glow);
    }

    /* ── Datum/tijd picker panel ── */
    .date-picker-panel {
      overflow: hidden;
      max-height: 0; opacity: 0;
      transition: max-height 0.3s ease, opacity 0.25s ease, margin-bottom 0.3s ease;
      margin-bottom: 0;
    }
    .date-picker-panel.open { max-height: 220px; opacity: 1; margin-bottom: 0.75rem; }
    .date-picker-inner {
      background: var(--card-bg); border: 1.5px solid var(--card-border);
      border-radius: var(--radius); padding: 0.75rem 0.875rem;
      box-shadow: var(--shadow-sm);
      display: flex; flex-direction: column; gap: 0.45rem;
    }
    .dp-field { display: flex; align-items: center; gap: 0.6rem; }
    .dp-field label {
      font-size: 0.72rem; font-weight: 600; color: var(--text-muted);
      min-width: 2.2rem; flex-shrink: 0;
    }
    .date-input {
      flex: 1; min-width: 0;
      padding: 0.38rem 0.55rem;
      border: 1.5px solid var(--card-border); border-radius: 0.5rem;
      background: var(--bg); color: var(--text);
      font-family: 'Inter', sans-serif; font-size: 0.78rem;
      outline: none; color-scheme: light dark;
      transition: border-color 0.15s;
    }
    .date-input:focus { border-color: var(--accent); }
    .apply-btn {
      width: 100%; padding: 0.48rem;
      background: var(--accent); color: white; border: none;
      border-radius: 0.625rem; margin-top: 0.1rem;
      font-family: 'Inter', sans-serif; font-size: 0.82rem; font-weight: 600;
      cursor: pointer; letter-spacing: 0.01em;
      box-shadow: 0 2px 8px -2px var(--accent-glow);
      transition: opacity 0.15s;
    }
    .apply-btn:active { opacity: 0.88; }

    /* ── Chart card ── */
    .chart-card {
      background: var(--card-bg); border: 1px solid var(--card-border);
      border-radius: var(--radius); padding: 1.125rem 1.125rem 0.75rem;
      margin-bottom: 1rem; box-shadow: var(--shadow);
    }
    .chart-header {
      display: flex; justify-content: space-between; align-items: flex-start;
      gap: 0.5rem; margin-bottom: 0.15rem;
    }
    .chart-title { font-family: 'Space Grotesk', sans-serif; font-size: 0.92rem; font-weight: 700; }
    .chart-sub { font-size: 0.74rem; color: var(--text-muted); margin-bottom: 0.875rem; margin-top: 0.15rem; }
    .chart-actions { display: flex; gap: 0.35rem; align-items: center; flex-shrink: 0; }

    .zoom-reset-btn, .expand-btn {
      display: none;
      align-items: center; gap: 0.2rem;
      padding: 0.22rem 0.5rem;
      border-radius: 999px;
      font-size: 0.68rem; font-weight: 600;
      cursor: pointer; white-space: nowrap;
      transition: opacity 0.15s;
    }
    .zoom-reset-btn {
      background: var(--accent-light); border: 1.5px solid var(--accent);
      color: var(--accent-dark);
    }
    .zoom-reset-btn.visible { display: inline-flex; }
    .expand-btn {
      background: var(--card-bg); border: 1.5px solid var(--card-border);
      color: var(--text-muted);
      display: inline-flex; /* altijd zichtbaar */
    }
    .expand-btn:hover { border-color: var(--accent); color: var(--accent-dark); }

    .chart-wrap { position: relative; height: 210px; }
    .chart-loading, .chart-no-data {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      gap: 0.5rem; color: var(--text-muted); font-size: 0.82rem;
    }
    .chart-spinner {
      width: 15px; height: 15px; flex-shrink: 0;
      border: 2px solid var(--card-border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    .chart-hint {
      font-size: 0.67rem; color: var(--text-muted);
      text-align: center; margin-top: 0.5rem; opacity: 0.65;
    }

    /* ── Global loading ── */
    .loading {
      text-align: center; padding: 3rem 1rem;
      color: var(--text-muted); font-size: 0.88rem;
    }
    .spinner {
      display: inline-block; width: 20px; height: 20px;
      border: 2px solid var(--card-border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin 0.7s linear infinite;
      margin-right: 0.5rem; vertical-align: middle;
    }
    .no-data { text-align: center; padding: 2rem 1rem; color: var(--text-muted); font-size: 0.82rem; line-height: 1.6; }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ═══════════════════════════════════════
       VOLLEDIG SCHERM OVERLAY
       ═══════════════════════════════════════ */
    .fs-overlay {
      position: fixed; inset: 0; z-index: 9999;
      background: var(--bg);
      display: none;
    }
    .fs-overlay.active { display: block; }

    /* ── Portrait: draai-hint ── */
    .fs-portrait {
      position: absolute; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1.25rem; padding: 2rem;
    }
    @media (orientation: landscape) { .fs-portrait { display: none; } }

    .phone-anim {
      color: var(--text-muted);
      animation: phoneRotate 2.8s ease-in-out infinite;
      transform-origin: center;
    }
    @keyframes phoneRotate {
      0%, 15%   { transform: rotate(0deg);   }
      40%, 70%  { transform: rotate(-90deg); }
      90%, 100% { transform: rotate(0deg);   }
    }
    .fs-portrait p {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 1.05rem; font-weight: 600;
      color: var(--text); text-align: center;
    }
    .fs-portrait small { font-size: 0.8rem; color: var(--text-muted); text-align: center; }

    /* ── Landscape: header balk + grafiek ── */
    .fs-landscape {
      position: absolute; inset: 0;
      display: none; flex-direction: column;
    }
    @media (orientation: landscape) { .fs-landscape { display: flex; } }

    /* Header balk: canvas raakt deze NOOIT aan */
    .fs-header {
      flex-shrink: 0;
      display: flex; align-items: center;
      gap: 0.5rem;
      padding: 0.3rem 0.6rem;
      background: var(--bg);
      border-bottom: 1px solid var(--card-border);
    }
    .fs-title {
      flex: 1;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 0.85rem; font-weight: 700;
      color: var(--text);
    }
    .fs-header-btn {
      flex-shrink: 0;
      height: 2.25rem; padding: 0 0.75rem;
      display: flex; align-items: center; justify-content: center;
      background: var(--card-bg); border: 1.5px solid var(--card-border);
      border-radius: 0.5rem; color: var(--text); cursor: pointer;
      font-size: 0.78rem; font-family: 'Space Grotesk', sans-serif; font-weight: 600;
      touch-action: manipulation;
    }
    .fs-header-btn.close-btn { width: 2.25rem; padding: 0; border-radius: 50%; }
    .fs-header-btn:hover { background: var(--accent-light); border-color: var(--accent); color: var(--accent-dark); }
    #fsResetBtn { display: none; }

    .fs-chart-wrap {
      flex: 1; min-height: 0; position: relative;
    }
    .fs-chart-wrap canvas { position: absolute; inset: 0; width: 100% !important; height: 100% !important; }

    /* ── Readout slider ── */
    .fs-readout {
      position: absolute; top: 0; bottom: 0; left: -9999px;
      width: 2px; background: var(--accent); opacity: 0;
      z-index: 6; cursor: ew-resize; touch-action: none;
      transition: opacity 0.18s;
    }
    /* Bredere onzichtbare raakzone */
    .fs-readout::before {
      content: ''; position: absolute;
      left: -16px; right: -16px; top: 0; bottom: 0;
    }
    .fs-readout-handle {
      position: absolute; left: 50%; bottom: 18%;
      width: 24px; height: 24px; transform: translateX(-50%);
      background: var(--accent); border-radius: 50%;
      border: 2.5px solid var(--bg); box-shadow: 0 2px 8px rgba(0,0,0,.35);
    }
    .fs-readout-card {
      position: absolute; top: 8%; left: 10px;
      background: var(--card-bg); border: 1.5px solid var(--card-border);
      border-radius: 8px; padding: .28rem .6rem;
      font-family: 'Space Grotesk', sans-serif;
      white-space: nowrap; pointer-events: none;
      box-shadow: var(--shadow); line-height: 1.4;
    }
    .fs-readout-time { font-size: .68rem; color: var(--text-muted); }
    .fs-readout-val  { font-size: .82rem; font-weight: 700; color: var(--text); }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1><span class="solar">Solar</span>Buffer</h1>
      <p>Grafieken</p>
    </div>

    <a class="back-btn" href="/">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M20,11V13H8L13.5,18.5L12.08,19.92L4.16,12L12.08,4.08L13.5,5.5L8,11H20Z"/></svg>
      Dashboard
    </a>

    <!-- Rij 1: snelle bereiken -->
    <div class="range-bar">
      <button class="range-btn active" data-hours="1"   onclick="setRange(this)">1u</button>
      <button class="range-btn" data-hours="24"         onclick="setRange(this)">24u</button>
      <button class="range-btn" data-hours="168"        onclick="setRange(this)">7d</button>
      <button class="range-btn" data-hours="720"        onclick="setRange(this)">30d</button>
    </div>

    <!-- Rij 2: datum/tijd kiezen -->
    <button class="datum-btn" id="datumBtn" data-hours="custom" onclick="setRange(this)">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M19,3H18V1H16V3H8V1H6V3H5A2,2 0 0,0 3,5V19A2,2 0 0,0 5,21H19A2,2 0 0,0 21,19V5A2,2 0 0,0 19,3M19,19H5V8H19V19Z"/></svg>
      Datum &amp; tijd kiezen
    </button>

    <!-- Datum picker panel -->
    <div class="date-picker-panel" id="datePicker">
      <div class="date-picker-inner">
        <div class="dp-field">
          <label for="fromInput">Van</label>
          <input class="date-input" type="date" id="fromInput" />
        </div>
        <div class="dp-field">
          <label for="toInput">Tot</label>
          <input class="date-input" type="date" id="toInput" />
        </div>
        <button class="apply-btn" onclick="applyCustomRange()">Grafieken laden</button>
      </div>
    </div>

    <div id="chartsArea">
      <div class="loading"><span class="spinner"></span>Gegevens laden…</div>
    </div>

  </div>

  <!-- ═══ Volledig scherm overlay ═══ -->
  <div class="fs-overlay" id="fsOverlay">

    <!-- Portrait: draai-hint -->
    <div class="fs-portrait">
      <div class="phone-anim">
        <svg width="64" height="64" viewBox="0 0 24 24" fill="currentColor" opacity="0.45">
          <path d="M17,1H7A2,2 0 0,0 5,3V21A2,2 0 0,0 7,23H17A2,2 0 0,0 19,21V3A2,2 0 0,0 17,1M17,19H7V5H17V19M12,20A1,1 0 0,1 11,19A1,1 0 0,1 12,18A1,1 0 0,1 13,19A1,1 0 0,1 12,20Z"/>
        </svg>
      </div>
      <p>Draai je telefoon</p>
      <small>voor een grotere weergave van de grafiek</small>
    </div>

    <!-- Landscape: header balk (buiten canvas!) + grafiek -->
    <div class="fs-landscape">
      <div class="fs-header">
        <div class="fs-title" id="fsTitle"></div>
        <button class="fs-header-btn" id="fsResetBtn" onclick="resetZoom('__fs__')">↺ Reset</button>
        <button class="fs-header-btn close-btn" id="fsCloseBtn" onclick="closeFullscreen()">
          <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M19,6.41L17.59,5L12,10.59L6.41,5L5,6.41L10.59,12L5,17.59L6.41,19L12,13.41L17.59,19L19,17.59L13.41,12L19,6.41Z"/></svg>
        </button>
      </div>
      <div class="fs-chart-wrap">
        <canvas id="fsCanvas"></canvas>
        <!-- Draggable readout slider -->
        <div class="fs-readout" id="fsReadout">
          <div class="fs-readout-card" id="fsReadoutCard">
            <div class="fs-readout-time" id="fsReadoutTime"></div>
            <div class="fs-readout-val"  id="fsReadoutVal"></div>
          </div>
          <div class="fs-readout-handle"></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const isDark    = document.documentElement.getAttribute('data-theme') === 'dark';
    const gridColor = isDark ? 'rgba(255,255,255,0.07)' : 'rgba(0,0,0,0.055)';
    const tickColor = isDark ? 'hsl(220,8%,50%)'        : 'hsl(220,10%,55%)';

    const chartInstances = {};
    const chartData      = {}; // canvasId → { labels, values, type, unit }

    let mode         = 'hours';
    let currentHours = 1;
    let customFrom   = null;
    let customTo     = null;
    let fsCanvasId   = null;
    let fsBuilt      = false;

    Chart.defaults.font.family = "'Inter', sans-serif";
    Chart.defaults.font.size   = 11;
    Chart.defaults.animation   = false; // geen opstart-animatie

    /* ── LTTB downsampling (behoudt pieken/dalen) ── */
    function lttb(pts, threshold) {
      const n = pts.length;
      if (n <= threshold) return pts;
      const out   = [pts[0]];
      const every = (n - 2) / (threshold - 2);
      let a = 0;
      for (let i = 0; i < threshold - 2; i++) {
        const avgOff = Math.floor((i + 1) * every) + 1;
        const avgEnd = Math.min(Math.floor((i + 2) * every) + 1, n);
        let ax = 0, ay = 0;
        for (let j = avgOff; j < avgEnd; j++) { ax += pts[j].ts; ay += pts[j].v; }
        ax /= (avgEnd - avgOff); ay /= (avgEnd - avgOff);
        const rOff = Math.floor(i * every) + 1;
        let maxA = -1, pick = rOff;
        const px = pts[a].ts, py = pts[a].v;
        for (let j = rOff; j < avgOff; j++) {
          const area = Math.abs((px - ax) * (pts[j].v - py) - (px - pts[j].ts) * (ay - py));
          if (area > maxA) { maxA = area; pick = j; }
        }
        out.push(pts[pick]);
        a = pick;
      }
      out.push(pts[n - 1]);
      return out;
    }

    // Vergrendel hoofdpagina in portret
    tryLockOrientation('portrait');

    /* ── Orientation lock ── */
    function tryLockOrientation(dir) {
      if (screen.orientation && screen.orientation.lock) {
        screen.orientation.lock(dir).catch(() => {});
      }
    }

    /* ── Tijdsbereik helpers ── */
    function getTimeRange() {
      if (mode === 'custom') return { from: customFrom, to: customTo };
      const to = Math.floor(Date.now() / 1000);
      return { from: to - currentHours * 3600, to };
    }
    function toDateInput(unixTs) {
      const d = new Date(unixTs * 1000);
      return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    }
    function fromDateInput(str) {
      const [y, m, d] = str.split('-').map(Number);
      return Math.floor(new Date(y, m - 1, d, 0, 0, 0).getTime() / 1000);
    }

    /* ── Bereik knoppen ── */
    function setRange(btn) {
      document.querySelectorAll('.range-btn, .datum-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      const panel = document.getElementById('datePicker');

      if (btn.dataset.hours === 'custom') {
        mode = 'custom';
        const nowTs = Math.floor(Date.now() / 1000);
        document.getElementById('fromInput').value = toDateInput(customFrom || nowTs - 86400);
        document.getElementById('toInput').value   = toDateInput(customTo   || nowTs);
        panel.classList.add('open');
      } else {
        mode         = 'hours';
        currentHours = parseInt(btn.dataset.hours);
        panel.classList.remove('open');
        loadAll();
      }
    }

    function applyCustomRange() {
      const f = fromDateInput(document.getElementById('fromInput').value);
      const t = fromDateInput(document.getElementById('toInput').value);
      if (!f || !t) return;
      if (f >= t) { alert('Begintijd moet vóór eindtijd liggen.'); return; }
      customFrom = f; customTo = t; mode = 'custom';
      loadAll();
    }

    /* ── Tijdlabels ── */
    function fmtTs(ts, rangeSeconds) {
      const d = new Date(ts * 1000);
      if (rangeSeconds <= 3600)
        return d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
      if (rangeSeconds <= 86400)
        return d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      if (rangeSeconds <= 86400 * 8)
        return d.toLocaleDateString('nl-NL', { weekday: 'short' }) + ' ' +
               d.toLocaleTimeString('nl-NL', { hour: '2-digit', minute: '2-digit' });
      return d.toLocaleDateString('nl-NL', { day: 'numeric', month: 'short' });
    }

    /* ── Zoom plugin opties + dynamisch bijladen ── */
    const _refetching = new Set();
    const _zoomTimers = {};

    function zoomOptions(canvasId) {
      return {
        zoom: {
          wheel:  { enabled: true, speed: 0.08 },
          pinch:  { enabled: true },
          mode:   'x',
          onZoomComplete: ({ chart }) => {
            clearTimeout(_zoomTimers[canvasId]);

            // Als de gebruiker volledig uitzoomt op een ingekort bereik → terug naar origineel
            const state = chartData[canvasId];
            if (state?.originalFrom != null && state.pts?.length) {
              const isSubset =
                state.pts[0].ts > state.originalFrom ||
                state.pts[state.pts.length - 1].ts < state.originalTo;
              if (isSubset) {
                const xs = chart.scales.x;
                if (xs.min <= 0 && xs.max >= state.pts.length - 1) {
                  resetZoom(canvasId);
                  return;
                }
              }
            }

            showResetBtn(canvasId);
            _zoomTimers[canvasId] = setTimeout(() => refetchForZoom(canvasId, chart), 500);
          },
        },
        pan: {
          enabled: true, mode: 'x',
          onPanComplete: () => showResetBtn(canvasId),
        },
        limits: { x: { minRange: 5 } },
      };
    }

    function showResetBtn(canvasId) {
      if (canvasId === '__fs__') {
        const btn = document.getElementById('fsResetBtn');
        if (btn) btn.style.display = '';
      } else {
        document.getElementById(canvasId)?.closest('.chart-card')
          ?.querySelector('.zoom-reset-btn')?.classList.add('visible');
      }
    }

    async function refetchForZoom(canvasId, chart) {
      if (_refetching.has(canvasId)) return;
      const state = chartData[canvasId];
      if (!state?.pts?.length) return;

      const xScale = chart.scales.x;
      const minIdx = Math.max(0, Math.round(xScale.min));
      const maxIdx = Math.min(state.pts.length - 1, Math.round(xScale.max));
      if (maxIdx <= minIdx + 2) return;

      const fromTs = state.pts[minIdx].ts;
      const toTs   = state.pts[maxIdx].ts;

      // Sla over als zichtbaar bereik meer dan 92% van het huidig bereik is
      const fullRange = state.pts[state.pts.length - 1].ts - state.pts[0].ts;
      if ((toTs - fromTs) > fullRange * 0.92) return;

      _refetching.add(canvasId);
      try {
        const res  = await fetch(`/api/history?metric=${encodeURIComponent(state.metric)}&from=${fromTs}&to=${toTs}`);
        const json = await res.json();
        const pts  = json.data || [];
        if (pts.length < 2) return;

        const rangeSeconds = toTs - fromTs;
        const sampled = lttb(pts, 500);
        const labels  = sampled.map(p => fmtTs(p.ts, rangeSeconds));
        const values  = sampled.map(p => p.v);

        // Update state; originalFrom/To uit 'state' blijft behouden (voor Reset-knop)
        chartData[canvasId] = { ...state, pts: sampled, labels, values };

        // Herbouw grafiek: schone aanpak, geen verouderde zoom-indices
        const canvas = canvasId === '__fs__'
          ? document.getElementById('fsCanvas')
          : document.getElementById(canvasId);
        buildChartOnCanvas(canvas, canvasId, labels, values, state.type, state.unit);
        showResetBtn(canvasId);
        if (canvasId === '__fs__') requestAnimationFrame(initFsReadout);
      } catch(e) {
        console.warn('zoom refetch mislukt', e);
      } finally {
        _refetching.delete(canvasId);
      }
    }

    async function resetZoom(canvasId) {
      const state = chartData[canvasId];
      const chart = chartInstances[canvasId];

      const hideResetBtn = () => {
        if (canvasId === '__fs__') {
          const btn = document.getElementById('fsResetBtn');
          if (btn) btn.style.display = 'none';
        } else {
          document.getElementById(canvasId)?.closest('.chart-card')
            ?.querySelector('.zoom-reset-btn')?.classList.remove('visible');
        }
      };

      if (state?.originalFrom != null) {
        try {
          const res  = await fetch(`/api/history?metric=${encodeURIComponent(state.metric)}&from=${state.originalFrom}&to=${state.originalTo}`);
          const json = await res.json();
          const pts  = json.data || [];
          if (pts.length >= 2) {
            const rangeSeconds = state.originalTo - state.originalFrom;
            const sampled = lttb(pts, 500);
            const labels  = sampled.map(p => fmtTs(p.ts, rangeSeconds));
            const values  = sampled.map(p => p.v);
            chartData[canvasId] = { ...state, pts: sampled, labels, values };
            const canvas = canvasId === '__fs__'
              ? document.getElementById('fsCanvas')
              : document.getElementById(canvasId);
            buildChartOnCanvas(canvas, canvasId, labels, values, state.type, state.unit);
          }
        } catch(e) {}
      } else if (chart) {
        chart.resetZoom();
      }

      hideResetBtn();
    }

    /* ── Kleuren ── */
    function chartColor(alpha, type) {
      if (type === 'net')         return `hsla(220, 70%, 55%, ${alpha})`;
      if (type === 'power')       return `hsla(145, 55%, 40%, ${alpha})`;
      if (type === 'temperature') return `hsla(0,   80%, 55%, ${alpha})`;
      return `hsla(260, 60%, 55%, ${alpha})`;
    }

    /* ── Grafiek bouwen op een canvas-element ── */
    function buildChartOnCanvas(canvas, instanceKey, labels, values, type, unit) {
      if (!canvas) return;
      if (chartInstances[instanceKey]) chartInstances[instanceKey].destroy();

      if (type === 'net') {
        buildNetOnCanvas(canvas, instanceKey, labels, values);
        return;
      }

      const color = chartColor(1, type);
      const fill  = chartColor(0.18, type);

      chartInstances[instanceKey] = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
          labels,
          datasets: [{ data: values, borderColor: color, backgroundColor: fill,
            borderWidth: 2, pointRadius: 0, tension: 0, fill: true }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: { callbacks: { label: c => `${c.parsed.y.toFixed(unit==='°C'?1:0)} ${unit}` } },
            zoom: zoomOptions(instanceKey),
          },
          scales: {
            x: { ticks: { color: tickColor, maxTicksLimit: 6, maxRotation: 0 }, grid: { color: gridColor } },
            y: { ticks: { color: tickColor, callback: v => (unit==='°C'?v.toFixed(1):Math.round(v))+' '+unit }, grid: { color: gridColor } }
          }
        }
      });
    }

    function buildNetOnCanvas(canvas, instanceKey, labels, values) {
      if (!canvas) return;
      if (chartInstances[instanceKey]) chartInstances[instanceKey].destroy();

      const purpleLine = isDark ? 'hsl(270,80%,72%)' : 'hsl(270,70%,55%)';
      const greenLine  = isDark ? 'hsl(145,75%,55%)' : 'hsl(145,65%,40%)';
      const zeroLine   = isDark ? 'rgba(255,255,255,0.22)' : 'rgba(0,0,0,0.18)';

      chartInstances[instanceKey] = new Chart(canvas.getContext('2d'), {
        type: 'line',
        data: {
          labels,
          datasets: [{
            data: values, borderWidth: 2, pointRadius: 0, tension: 0, fill: 'origin',
            segment: {
              borderColor: c => {
                const mid = (c.p0.parsed.y + c.p1.parsed.y) / 2;
                return mid >= 0 ? purpleLine : greenLine;
              },
            },
            backgroundColor: function(context) {
              const chart = context.chart;
              const { ctx: c, chartArea } = chart;
              if (!chartArea) return 'transparent';
              const zeroY = chart.scales.y.getPixelForValue(0);
              const { top, bottom } = chartArea;
              const ratio = Math.max(0, Math.min(1, (zeroY - top) / (bottom - top)));
              const g = c.createLinearGradient(0, top, 0, bottom);
              g.addColorStop(0,     isDark ? 'hsla(270,70%,65%,0.42)' : 'hsla(270,70%,55%,0.26)');
              g.addColorStop(ratio, isDark ? 'hsla(270,70%,65%,0.05)' : 'hsla(270,70%,55%,0.03)');
              g.addColorStop(ratio, isDark ? 'hsla(160,55%,40%,0.05)' : 'hsla(160,55%,40%,0.03)');
              g.addColorStop(1,     isDark ? 'hsla(160,55%,35%,0.52)' : 'hsla(160,55%,35%,0.36)');
              return g;
            },
          }]
        },
        options: {
          responsive: true, maintainAspectRatio: false,
          interaction: { mode: 'index', intersect: false },
          plugins: {
            legend: { display: false },
            tooltip: {
              callbacks: {
                label: c => c.parsed.y >= 0
                  ? `Verbruik: ${c.parsed.y.toFixed(0)} W`
                  : `Teruglevering: ${Math.abs(c.parsed.y).toFixed(0)} W`,
                labelColor: c => {
                  const col = c.parsed.y >= 0 ? purpleLine : greenLine;
                  return { borderColor: col, backgroundColor: col };
                }
              }
            },
            zoom: zoomOptions(instanceKey),
          },
          scales: {
            x: { ticks: { color: tickColor, maxTicksLimit: 6, maxRotation: 0 }, grid: { color: gridColor } },
            y: {
              ticks: { color: tickColor, callback: v => Math.round(v) + ' W' },
              grid: {
                color:     c => c.tick.value === 0 ? zeroLine : gridColor,
                lineWidth: c => c.tick.value === 0 ? 2 : 1,
              }
            }
          }
        }
      });
    }

    function buildChart(canvasId, labels, values, type, unit, pts, metric) {
      chartData[canvasId] = {
        labels, values, type, unit, pts, metric,
        originalFrom: pts[0]?.ts,
        originalTo:   pts[pts.length - 1]?.ts,
      };
      buildChartOnCanvas(document.getElementById(canvasId), canvasId, labels, values, type, unit);
    }

    /* ── Volledig scherm ── */
    function openFullscreen(canvasId, title) {
      fsCanvasId = canvasId;
      fsBuilt    = false;
      document.getElementById('fsTitle').textContent = title;
      document.getElementById('fsOverlay').classList.add('active');
      document.body.style.overflow = 'hidden';
      tryLockOrientation('landscape');
      checkFsOrientation();
    }

    function closeFullscreen() {
      document.getElementById('fsOverlay').classList.remove('active');
      document.body.style.overflow = '';
      if (chartInstances['__fs__']) {
        chartInstances['__fs__'].destroy();
        delete chartInstances['__fs__'];
      }
      const btn = document.getElementById('fsResetBtn');
      if (btn) btn.style.display = 'none';
      const rd = document.getElementById('fsReadout');
      if (rd) rd.style.opacity = '0';
      fsCanvasId = null;
      fsBuilt    = false;
      tryLockOrientation('portrait');
    }

    function checkFsOrientation() {
      if (!document.getElementById('fsOverlay').classList.contains('active')) return;
      const isLandscape = window.innerWidth > window.innerHeight;
      if (isLandscape && !fsBuilt && fsCanvasId && chartData[fsCanvasId]) {
        fsBuilt = true;
        setTimeout(() => {
          const src = chartData[fsCanvasId];
          chartData['__fs__'] = { ...src };
          buildChartOnCanvas(document.getElementById('fsCanvas'), '__fs__', src.labels, src.values, src.type, src.unit);
          requestAnimationFrame(initFsReadout);
        }, 120);
      }
    }

    window.addEventListener('resize', checkFsOrientation);

    /* ── Readout slider: draggable verticale lijn ── */
    let _fsRdDragging = false;

    function _fsRdRelX(e) {
      const rect = document.getElementById('fsCanvas')?.parentElement?.getBoundingClientRect();
      if (!rect) return 0;
      const src = e.touches?.[0] ?? e.changedTouches?.[0] ?? e;
      return src.clientX - rect.left;
    }

    function _fsRdMove(relX) {
      const track = document.getElementById('fsReadout');
      const chart = chartInstances['__fs__'];
      const state = chartData['__fs__'];
      if (!track || !chart?.chartArea || !state?.pts?.length) return;

      const { left, right } = chart.chartArea;
      const x = Math.max(left, Math.min(right, relX));
      track.style.left = x + 'px';

      const idx = Math.max(0, Math.min(state.pts.length - 1,
                    Math.round(chart.scales.x.getValueForPixel(x))));

      document.getElementById('fsReadoutTime').textContent = state.labels[idx] ?? '';

      const v = state.values[idx];
      const unit = state.unit, type = state.type;
      let txt;
      if (v == null)          txt = '—';
      else if (type === 'net') txt = v >= 0
        ? `${Math.round(v)} W verbruik`
        : `${Math.abs(Math.round(v))} W teruglevering`;
      else if (unit === '°C') txt = `${v.toFixed(1)} °C`;
      else                    txt = `${Math.round(v)} ${unit}`;
      document.getElementById('fsReadoutVal').textContent = txt;

      // Kaartje links of rechts van de lijn
      const card = document.getElementById('fsReadoutCard');
      if (card) {
        const ww = track.parentElement?.offsetWidth || 1;
        if (x > ww * 0.55) { card.style.left = ''; card.style.right = '10px'; }
        else                { card.style.left = '10px'; card.style.right = ''; }
      }
    }

    function initFsReadout() {
      const chart = chartInstances['__fs__'];
      const track = document.getElementById('fsReadout');
      if (!chart?.chartArea || !track) return;
      const mid = (chart.chartArea.left + chart.chartArea.right) / 2;
      track.style.left    = mid + 'px';
      track.style.opacity = '1';
      _fsRdMove(mid);
    }

    // Event listeners (eenmalig instellen)
    (function() {
      const track = document.getElementById('fsReadout');
      if (!track) return;
      track.addEventListener('touchstart', e => {
        _fsRdDragging = true;
        _fsRdMove(_fsRdRelX(e));
      }, { passive: true });
      track.addEventListener('touchmove', e => {
        if (!_fsRdDragging) return;
        e.preventDefault();
        _fsRdMove(_fsRdRelX(e));
      }, { passive: false });
      track.addEventListener('touchend', () => { _fsRdDragging = false; });
      track.addEventListener('mousedown', e => {
        _fsRdDragging = true; _fsRdMove(_fsRdRelX(e)); e.preventDefault();
      });
      document.addEventListener('mousemove', e => { if (_fsRdDragging) _fsRdMove(_fsRdRelX(e)); });
      document.addEventListener('mouseup',   () => { _fsRdDragging = false; });
    })();

    /* ── Data ophalen ── */
    async function fetchHistory(metric) {
      const { from, to } = getTimeRange();
      const res = await fetch(`/api/history?metric=${encodeURIComponent(metric)}&from=${from}&to=${to}`);
      return res.json();
    }

    function metricLabel(metric) {
      if (metric === 'net_power')
        return ['Netvermogen', 'Verbruik (paars) · teruglevering (groen)', 'W', 'net'];
      const dm = metric.match(/^device:(.+):power$/);
      if (dm) return [dm[1], 'Gemeten vermogen', 'W', 'power'];
      const am = metric.match(/^acc:(.+):(power|temperature)$/);
      if (am) {
        if (am[2] === 'temperature') return [am[1] + ' — Temp.', 'Gemeten temperatuur', '°C', 'temperature'];
        if (am[2] === 'power')       return [am[1] + ' — Vermogen', 'Gemeten vermogen', 'W', 'power'];
      }
      return [metric, '', '', 'other'];
    }

    /* ── Kaarten renderen ── */
    function renderCards(metrics) {
      const area = document.getElementById('chartsArea');
      if (!metrics.length) {
        area.innerHTML = '<div class="no-data">Nog geen historische data beschikbaar.<br>Data wordt elke 5 seconden opgeslagen.</div>';
        return;
      }
      const order = m => m === 'net_power' ? 0 : m.startsWith('device:') ? 1 : m.endsWith(':temperature') ? 3 : 2;
      metrics.sort((a, b) => order(a) - order(b));

      area.innerHTML = metrics.map((m, i) => {
        const [title, sub] = metricLabel(m);
        const cid = `chart_${i}`;
        const titleEsc = title.replace(/'/g, '\\\'');
        return `
          <div class="chart-card">
            <div class="chart-header">
              <div>
                <div class="chart-title">${title}</div>
                <div class="chart-sub">${sub}</div>
              </div>
              <div class="chart-actions">
                <button class="zoom-reset-btn" onclick="resetZoom('${cid}')">
                  <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><path d="M17.65 6.35A7.96 7.96 0 0 0 12 4a8 8 0 1 0 8 8h-2a6 6 0 1 1-1.76-4.24L13 11h7V4l-2.35 2.35Z"/></svg>
                  Reset
                </button>
                <button class="expand-btn" onclick="openFullscreen('${cid}', '${titleEsc}')">
                  <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
                    <path d="M15 3h6v6M9 21H3v-6M21 3l-7 7M3 21l7-7"/>
                  </svg>
                </button>
              </div>
            </div>
            <div class="chart-wrap">
              <div class="chart-loading" id="loading_${cid}">
                <div class="chart-spinner"></div>Laden…
              </div>
              <canvas id="${cid}" style="display:none"></canvas>
            </div>
            <div class="chart-hint">Scroll of knijp om in te zoomen &nbsp;·&nbsp; Sleep om te verschuiven</div>
          </div>`;
      }).join('');

      metrics.forEach(async (m, i) => {
        const cid     = `chart_${i}`;
        const [,, unit, type] = metricLabel(m);
        const loading = document.getElementById(`loading_${cid}`);
        const canvas  = document.getElementById(cid);
        if (!loading || !canvas) return;
        try {
          const data = await fetchHistory(m);
          const pts  = data.data || [];
          if (!pts.length) {
            loading.className = 'chart-no-data';
            loading.innerHTML = 'Geen data in dit tijdsbestek';
            return;
          }
          const { from, to } = getTimeRange();
          const sampled = lttb(pts, 500);
          const labels  = sampled.map(p => fmtTs(p.ts, to - from));
          const values  = sampled.map(p => p.v);
          loading.style.display = 'none';
          canvas.style.display  = 'block';
          buildChart(cid, labels, values, type, unit, sampled, m);
        } catch(e) {
          if (loading) { loading.className = 'chart-no-data'; loading.innerHTML = 'Laden mislukt'; }
          console.error(m, e);
        }
      });
    }

    /* ── Laden ── */
    async function fetchMetrics() {
      const res  = await fetch('/api/history/metrics');
      const json = await res.json();
      return (json.metrics || []).filter(m =>
        m === 'net_power' ||
        /^device:.+:power$/.test(m) ||
        /^acc:.+:(power|temperature)$/.test(m)
      );
    }

    let _activeMetricKey = '';

    async function loadAll() {
      document.getElementById('chartsArea').innerHTML =
        '<div class="loading"><span class="spinner"></span>Gegevens laden…</div>';
      try {
        const metrics = await fetchMetrics();
        _activeMetricKey = JSON.stringify(metrics.slice().sort());
        renderCards(metrics);
      } catch(e) {
        document.getElementById('chartsArea').innerHTML =
          '<div class="no-data">Laden mislukt. Controleer de verbinding.</div>';
      }
    }

    setInterval(async () => {
      if (mode === 'custom') return;
      try {
        const metrics = await fetchMetrics();
        if (JSON.stringify(metrics.slice().sort()) !== _activeMetricKey) loadAll();
      } catch(e) {}
    }, 30000);

    loadAll();
  </script>
</body>
</html>
