<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#f9f7f5" id="themeColorMeta">
  <title>Instellingen - SolarBuffer</title>
  <script>
    (function () {
      var dark = {{ dark_mode | tojson }};
      localStorage.setItem("theme", dark ? "dark" : "light");
      if (dark) {
        document.documentElement.setAttribute("data-theme", "dark");
        document.getElementById("themeColorMeta").setAttribute("content", "#2e3238");
      }
    })();
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top, hsla(38, 100%, 70%, 0.12), transparent 28%),
        hsl(30, 25%, 97%);
      color: hsl(220, 20%, 14%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    h1, h2 { font-family: 'Space Grotesk', sans-serif; }

    .container { width: 100%; max-width: 480px; }

    .header { text-align: center; margin-bottom: 1.75rem; }
    .header h1 { font-size: 1.75rem; font-weight: 700; }
    .header h1 .solar {
      background: linear-gradient(135deg, hsl(32, 95%, 52%), hsl(40, 100%, 60%));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .header p { color: hsl(220, 10%, 46%); font-size: 0.85rem; margin-top: 0.25rem; }

    .settings-list {
      background: white;
      border: 1px solid hsl(30, 15%, 88%);
      border-radius: 0.875rem;
      box-shadow: 0 10px 40px -10px hsla(32, 95%, 52%, 0.15);
      overflow: hidden;
      margin-bottom: 1rem;
    }

    .settings-item {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 1rem 1.1rem;
      border-bottom: 1px solid hsl(30, 15%, 91%);
      text-decoration: none;
      color: inherit;
      cursor: pointer;
      transition: background 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .settings-item:last-child { border-bottom: none; }
    .settings-item:hover { background: hsl(30, 25%, 97%); }
    .settings-item:active { background: hsl(30, 20%, 94%); }

    .settings-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: hsl(32, 100%, 95%);
      color: hsl(32, 95%, 48%);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .settings-text { flex: 1; min-width: 0; }
    .settings-label {
      font-weight: 600;
      font-size: 0.95rem;
    }
    .settings-sub {
      font-size: 0.78rem;
      color: hsl(220, 10%, 50%);
      margin-top: 0.1rem;
    }

    .settings-chevron {
      color: hsl(220, 10%, 68%);
      flex-shrink: 0;
    }

    .section-title {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: hsl(220, 10%, 52%);
      padding: 0 0.25rem;
      margin: 1.25rem 0 0.4rem;
    }

    .back-link { text-align: center; margin-top: 0.75rem; }
    .back-link a {
      color: hsl(220, 10%, 46%);
      font-size: 0.85rem;
      text-decoration: none;
    }
    .back-link a:hover { color: hsl(32, 95%, 52%); }

    /* ===== DARK MODE ===== */
    html[data-theme="dark"] body {
      background: hsl(220, 8%, 18%);
      color: hsl(220, 10%, 88%);
    }
    html[data-theme="dark"] .header p { color: hsl(220, 8%, 55%); }

    html[data-theme="dark"] .settings-list {
      background: hsl(220, 8%, 24%);
      border-color: hsl(220, 8%, 32%);
      box-shadow: 0 10px 40px -10px rgba(0,0,0,0.25);
    }
    html[data-theme="dark"] .settings-item {
      border-bottom-color: hsl(220, 8%, 30%);
    }
    html[data-theme="dark"] .settings-item:hover  { background: hsl(220, 8%, 28%); }
    html[data-theme="dark"] .settings-item:active { background: hsl(220, 8%, 31%); }
    html[data-theme="dark"] .settings-icon {
      background: hsl(32, 30%, 26%);
      color: hsl(32, 80%, 62%);
    }
    html[data-theme="dark"] .settings-sub    { color: hsl(220, 8%, 55%); }
    html[data-theme="dark"] .settings-chevron { color: hsl(220, 8%, 45%); }
    html[data-theme="dark"] .section-title   { color: hsl(220, 8%, 52%); }
    html[data-theme="dark"] .back-link a     { color: hsl(220, 8%, 55%); }
  </style>
</head>
<body>
  <div class="container">

    <div class="header">
      <h1><span class="solar">Solar</span>Buffer</h1>
      <p>Instellingen</p>
    </div>

    <div class="section-title">Configuratie</div>
    <div class="settings-list">

      <a class="settings-item" href="/wizard_forced">
        <div class="settings-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M12,15.5A3.5,3.5 0 0,1 8.5,12A3.5,3.5 0 0,1 12,8.5A3.5,3.5 0 0,1 15.5,12A3.5,3.5 0 0,1 12,15.5M19.43,12.97C19.47,12.65 19.5,12.33 19.5,12C19.5,11.67 19.47,11.34 19.43,11L21.54,9.37C21.73,9.22 21.78,8.95 21.66,8.73L19.66,5.27C19.54,5.05 19.27,4.96 19.05,5.05L16.56,6.05C16.04,5.66 15.5,5.32 14.87,5.07L14.5,2.42C14.46,2.18 14.25,2 14,2H10C9.75,2 9.54,2.18 9.5,2.42L9.13,5.07C8.5,5.32 7.96,5.66 7.44,6.05L4.95,5.05C4.73,4.96 4.46,5.05 4.34,5.27L2.34,8.73C2.21,8.95 2.27,9.22 2.46,9.37L4.57,11C4.53,11.34 4.5,11.67 4.5,12C4.5,12.33 4.53,12.65 4.57,12.97L2.46,14.63C2.27,14.78 2.21,15.05 2.34,15.27L4.34,18.73C4.46,18.95 4.73,19.03 4.95,18.95L7.44,17.94C7.96,18.34 8.5,18.68 9.13,18.93L9.5,21.58C9.54,21.82 9.75,22 10,22H14C14.25,22 14.46,21.82 14.5,21.58L14.87,18.93C15.5,18.68 16.04,18.34 16.56,17.94L19.05,18.95C19.27,19.03 19.54,18.95 19.66,18.73L21.66,15.27C21.78,15.05 21.73,14.78 21.54,14.63L19.43,12.97Z"/></svg>
        </div>
        <div class="settings-text">
          <div class="settings-label">Apparaten &amp; IP-adressen</div>
          <div class="settings-sub">P1-meter, Shelly's en expert-instellingen</div>
        </div>
        <svg class="settings-chevron" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
      </a>

      <a class="settings-item" href="/config/backup">
        <div class="settings-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M5,20H19V18H5M19,9H15V3H9V9H5L12,16L19,9Z"/></svg>
        </div>
        <div class="settings-text">
          <div class="settings-label">Config back-up</div>
          <div class="settings-sub">Exporteren of importeren</div>
        </div>
        <svg class="settings-chevron" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
      </a>

    </div>

    <div class="section-title">Account</div>
    <div class="settings-list">

      <a class="settings-item" href="/change_credentials">
        <div class="settings-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M7,14A2,2 0 0,1 5,12A2,2 0 0,1 7,10A2,2 0 0,1 9,12A2,2 0 0,1 7,14M12.65,10C11.83,7.67 9.61,6 7,6A6,6 0 0,0 1,12A6,6 0 0,0 7,18C9.61,18 11.83,16.33 12.65,14H17V18H21V14H23V10H12.65Z"/></svg>
        </div>
        <div class="settings-text">
          <div class="settings-label">Inloggegevens</div>
          <div class="settings-sub">Gebruikersnaam en wachtwoord wijzigen</div>
        </div>
        <svg class="settings-chevron" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
      </a>

      <a class="settings-item" href="/users">
        <div class="settings-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M16,13C15.71,13 15.38,13 15.03,13.05C16.19,13.89 17,15 17,16.5V19H23V16.5C23,14.17 18.33,13 16,13M8,13C5.67,13 1,14.17 1,16.5V19H15V16.5C15,14.17 10.33,13 8,13M8,11A3,3 0 0,0 11,8A3,3 0 0,0 8,5A3,3 0 0,0 5,8A3,3 0 0,0 8,11M16,11A3,3 0 0,0 19,8A3,3 0 0,0 16,5A3,3 0 0,0 13,8A3,3 0 0,0 16,11Z"/></svg>
        </div>
        <div class="settings-text">
          <div class="settings-label">Gebruikersbeheer</div>
          <div class="settings-sub">Gebruikers toevoegen of verwijderen</div>
        </div>
        <svg class="settings-chevron" width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M8.59,16.58L13.17,12L8.59,7.41L10,6L16,12L10,18L8.59,16.58Z"/></svg>
      </a>

    </div>

    <div class="back-link">
      <a href="/dashboard">← Terug naar dashboard</a>
    </div>

  </div>
</body>
</html>
